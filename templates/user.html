{% extends "base.html" %}
{% block title %}用户详情{% endblock %}
{% block content %}
<style>
/* ── User Page Variables ── */
.user-page {
    --indigo: var(--primary);
    --indigo-dark: var(--primary-dark);
    --slate-100: #f1f5f9;
    --slate-200: var(--border);
    --slate-400: var(--text-muted);
    --slate-600: #475569;
    --slate-800: #1e293b;
}

/* ── User Header ── */
.user-header-card {
    background: linear-gradient(135deg, var(--primary-light) 0%, #fff 60%);
    padding: 28px 24px 20px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(99,102,241,0.12);
}
.user-header-card::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
    pointer-events: none;
}
.user-header-top {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
}
.user-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #06b6d4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(99,102,241,0.25);
    overflow: hidden;
}
.user-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}
.user-info { min-width: 0; flex: 1; }
.user-name {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin: 0;
    line-height: 1.3;
}
.user-meta-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
}
.user-meta-tags .badge { font-size: 11px; padding: 2px 10px; }

/* ── Tab Bar ── */
.tab-card {
    padding: 0;
    overflow: hidden;
}
.tab-bar {
    display: flex;
    background: var(--card);
    position: relative;
}
.tab-btn {
    flex: 1;
    padding: 14px 12px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    transition: color var(--transition-base), background var(--transition-base);
    position: relative;
    white-space: nowrap;
}
.tab-btn:hover {
    background: var(--primary-light);
    color: var(--primary);
}

/* ── Timeline Entries ── */
#session-list > div {
    transition: background var(--transition-fast);
    border-radius: 6px;
    padding-left: 4px !important;
    padding-right: 4px !important;
}
#session-list > div:hover { background: var(--primary-light); }
#session-list > div:last-child { border-bottom: none !important; }

/* ── Tab Content ── */
.tab-content .card:first-child { margin-top: 0; }

/* ── Empty State ── */
.session-empty {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-muted);
    font-size: 13px;
}

/* ── Timeline filter button override ── */
#tl-type-all,
#tl-type-gift,
#tl-type-chat {
    cursor: pointer;
}
</style>

<div class="user-page">

<div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="msg">加载中...</div>
</div>

<div id="user-content" style="display:none;">

<!-- User Header -->
<div class="card user-header-card">
    <div class="user-header-top">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
            <h1 class="user-name" id="user-name"></h1>
            <div class="user-meta-tags" id="user-meta"></div>
        </div>
        <a id="douyin-link" href="#" target="_blank" rel="noopener"
           style="display:none;background:var(--primary);color:#fff;border:none;
                  border-radius:var(--radius-sm);padding:6px 14px;font-size:13px;
                  font-weight:600;text-decoration:none;white-space:nowrap;
                  flex-shrink:0;transition:opacity var(--transition-fast);"
           title="在抖音查看该用户主页">跳转到主页 &#x2197;</a>
        <button id="notes-edit-btn" onclick="toggleNotesEdit()"
                style="background:none;border:1px solid var(--border);color:var(--text-muted);
                       font-size:14px;cursor:pointer;padding:4px 10px;border-radius:var(--radius-sm);
                       flex-shrink:0;transition:color var(--transition-fast);"
                title="备注/标签">&#9998;</button>
    </div>
    <!-- Notes/Tags Editor -->
    <div id="notes-editor" style="display:none;margin-bottom:16px;position:relative;z-index:1;">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
            <div style="flex:1;min-width:140px;">
                <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px;">备注</label>
                <input id="notes-input" type="text" placeholder="添加备注..." maxlength="200"
                       style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--card);color:var(--text);">
            </div>
            <div style="flex:1;min-width:140px;">
                <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px;">标签（逗号分隔）</label>
                <input id="tags-input" type="text" placeholder="老板, 铁粉..." maxlength="200"
                       style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--card);color:var(--text);">
            </div>
            <button onclick="saveNotes()" style="background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;">保存</button>
            <button onclick="toggleNotesEdit()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;cursor:pointer;">取消</button>
        </div>
    </div>
    <div class="stats-row">
        <div class="stat-card" style="border-left-color:var(--primary);">
            <div class="num" id="stat-session-wave">0</div>
            <div class="label">本场音浪</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--success);">
            <div class="num" id="stat-session-gifts">0</div>
            <div class="label">本场礼物</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--warning);">
            <div class="num" id="stat-session-chats">0</div>
            <div class="label">本场发言</div>
        </div>
        <div class="stat-card" style="border-left-color:#06b6d4;">
            <div class="num" id="stat-total-wave">0</div>
            <div class="label">累计音浪</div>
        </div>
    </div>
</div>

<!-- Tabs -->
<div class="card tab-card">
    <div class="tab-bar" style="border-bottom:2px solid var(--border);">
        <button class="tab-btn active" data-tab="timeline" style="color:var(--indigo);border-bottom:2px solid var(--indigo);margin-bottom:-2px;">消费时间轴</button>
        <button class="tab-btn" data-tab="gifts" style="color:var(--slate-400);border-bottom:2px solid transparent;margin-bottom:-2px;">送礼流水</button>
        <button class="tab-btn" data-tab="chats" style="color:var(--slate-400);border-bottom:2px solid transparent;margin-bottom:-2px;">弹幕记录</button>
        <button class="tab-btn" data-tab="table" style="color:var(--slate-400);border-bottom:2px solid transparent;margin-bottom:-2px;">场次记录</button>
    </div>
</div>

<!-- Tab: Timeline -->
<div id="tab-timeline" class="tab-content">
    <div class="card">
        <div class="flex-between" style="margin-bottom:8px;">
            <h2 style="margin:0;">
                <span>消费时间轴</span>
                <span class="sub">按时间倒序</span>
            </h2>
            <button onclick="exportTimelineCSV()" style="background:var(--success);color:#fff;border:1px solid var(--success);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">&#x2B06; 导出CSV</button>
        </div>
        <div class="filter-bar" style="margin-bottom:12px;">
            <div class="btn-group" id="tl-filter-group">
                <button class="active" id="tl-type-all" onclick="filterTimeline('all')">全部</button>
                <button id="tl-type-gift" onclick="filterTimeline('gift')">&#127873; 礼物</button>
                <button id="tl-type-chat" onclick="filterTimeline('chat')">&#128172; 发言</button>
            </div>
        </div>
        <div id="session-list"></div>
    </div>
</div>

<!-- Tab: Gifts -->
<div id="tab-gifts" class="tab-content" style="display:none;">
    <div class="card">
        <div class="flex-between" style="margin-bottom:8px;">
            <h2 style="margin:0;">
                <span>送礼流水</span>
                <span class="sub">按时间倒序</span>
            </h2>
            <button onclick="exportUserCSV()" style="background:var(--success);color:#fff;border:1px solid var(--success);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">&#x2B06; 导出CSV</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>时间</th><th>主播</th><th>礼物</th><th>数量</th><th>钻石</th><th>财富等级</th><th>粉丝团</th></tr>
                </thead>
                <tbody id="gift-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Tab: Chats -->
<div id="tab-chats" class="tab-content" style="display:none;">
    <div class="card">
        <div class="flex-between" style="margin-bottom:8px;">
            <h2 style="margin:0;">
                <span>弹幕记录</span>
                <span class="sub">按时间倒序</span>
            </h2>
            <button onclick="exportChatCSV()" style="background:var(--success);color:#fff;border:1px solid var(--success);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">&#x2B06; 导出CSV</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>时间</th><th>主播</th><th>内容</th><th>财富等级</th><th>粉丝团</th></tr>
                </thead>
                <tbody id="chat-table-body"></tbody>
            </table>
        </div>
        <div id="chat-pagination" style="margin-top:12px;display:flex;justify-content:center;gap:8px;"></div>
    </div>
</div>

<!-- Tab: Sessions -->
<div id="tab-table" class="tab-content" style="display:none;">
    <div class="card">
        <div class="flex-between" style="margin-bottom:8px;">
            <h2 style="margin:0;">
                <span>场次记录</span>
                <span class="sub">最近场次优先</span>
            </h2>
            <button onclick="exportUserCSV()" style="background:var(--success);color:#fff;border:1px solid var(--success);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">&#x2B06; 导出CSV</button>
        </div>
        <div class="flex-between" style="margin-bottom:8px;">
            <h3 style="font-size:13px;color:var(--text-muted);margin:0;">各场次消费对比</h3>
            <button id="user-chart-toggle" onclick="toggleUserChart()"
                    style="background:none;border:1px solid var(--border);color:var(--text-muted);
                           font-size:11px;cursor:pointer;padding:2px 8px;border-radius:4px;">隐藏</button>
        </div>
        <div id="user-chart-wrap" style="margin-bottom:16px;">
            <canvas id="session-spend-chart" style="max-height:250px;"></canvas>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>日期</th><th>财富等级</th><th>粉丝团</th><th>音浪</th><th>&#127873;</th><th>&#128172;</th></tr>
                </thead>
                <tbody id="session-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

</div><!-- /user-content -->
</div><!-- /user-page -->

<script>
var uid = new URLSearchParams(window.location.search).get('uid') || '';

function toggleNotesEdit() {
    var editor = document.getElementById('notes-editor');
    editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
}

function saveNotes() {
    var notes = document.getElementById('notes-input').value.trim();
    var tags = document.getElementById('tags-input').value.trim();
    fetchWithTimeout('/api/user/' + uid + '/notes', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({notes: notes, tags: tags})
    }).then(function(r) { return r.json(); })
      .then(function(d) {
          if (d.success) {
              showToast('备注已保存', 'success');
              toggleNotesEdit();
              loadUser();
          }
      }).catch(function(err) {
          showToast('保存失败: ' + err.message, 'error');
      });
}

function setAvatar(name, avatarUrl) {
    var el = document.getElementById('user-avatar');
    el.innerHTML = '';
    if (avatarUrl) {
        var img = document.createElement('img');
        img.src = avatarUrl;
        img.alt = name || '';
        img.onerror = function() {
            // 头像加载失败时回退到首字母
            el.innerHTML = '';
            el.textContent = name ? name.charAt(0).toUpperCase() : '?';
        };
        el.appendChild(img);
    } else if (name && name.length > 0) {
        el.textContent = name.charAt(0).toUpperCase();
    }
}

/* ── Tab switching ── */
document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) {
            b.style.color = 'var(--text-muted)';
            b.style.borderBottom = '2px solid transparent';
        });
        this.style.color = 'var(--indigo)';
        this.style.borderBottom = '2px solid var(--indigo)';
        document.querySelectorAll('.tab-content').forEach(function(t) { t.style.display = 'none'; });
        document.getElementById('tab-' + this.dataset.tab).style.display = 'block';
    });
});

var currentFilter = 'all';

/**
 * Parse badge JSON array and render <img> tags for each badge.
 * badge_json is a JSON array of {url, name?, level?, alt?, font_color?}.
 * Also handles legacy badge_img_list (array of base64-encoded PNGs).
 */
function renderBadges(badge_json) {
    if (!badge_json) return '';
    try {
        var arr = typeof badge_json === 'string' ? JSON.parse(badge_json) : badge_json;
        if (!Array.isArray(arr)) return '';
        var hasStarGuard = arr.some(function(b) { return b.url && b.url.indexOf('star_guard') !== -1; });
        var seen = {};
        return arr.filter(function(b) {
            if (!b || !b.url) return false;
            // Dedup by base URL
            var baseKey = b.url.split('~tplv')[0];
            if (seen[baseKey]) return false;
            seen[baseKey] = true;
            // Keep: level badge, league icon, membership V, star_guard, or fansclub _xmp overlay
            var isLevel = b.url.indexOf('new_shining_level') !== -1 || b.url.indexOf('new_user_grade_level') !== -1;
            var isLeague = b.url.indexOf('league') !== -1;
            var isMembershipV = b.url.indexOf('1231241211V') !== -1;
            var isStarGuard = b.url.indexOf('star_guard') !== -1;
            var isFansclubXmp = b.url.indexOf('fansclub') !== -1 && b.url.indexOf('_xmp') !== -1;
            var isFansclubBase = b.url.indexOf('fansclub_level_v6_') !== -1 && b.url.indexOf('_xmp') === -1;
            // Skip base fansclub image
            if (isFansclubBase) return false;
            // When star_guard present, skip regular fansclub _xmp
            if (hasStarGuard && isFansclubXmp) return false;
            return isLevel || isLeague || isMembershipV || isStarGuard || isFansclubXmp;
        }).map(function(b) {
            var title = '';
            if (b.name) title += b.name;
            if (b.level) title += (title ? ' ' : '') + 'Lv' + b.level;
            if (b.alt && !b.name) title = b.alt;
            return '<img src="' + b.url + '" alt="' + (b.alt || '') + '" title="' + title + '" ' +
                   'style="height:16px;width:auto;object-fit:contain;border-radius:2px;">';
        }).join('');
    } catch(e) {
        if (typeof badge_json === 'string' && badge_json.startsWith('[') && badge_json.includes('http')) {
            try { return renderBadges(JSON.parse(badge_json)); } catch(e2) {}
        }
        return '';
    }
}
function filterTimeline(type) {
    if (!allData) return;
    currentFilter = type;
    document.querySelectorAll('#tl-type-all, #tl-type-gift, #tl-type-chat').forEach(function(el) {
        if (el.id === 'tl-type-' + type) {
            el.style.background = 'var(--primary)';
            el.style.color = '#fff';
        } else {
            el.style.background = '';
            el.style.color = '';
        }
    });
    renderSessions(allData);
}

var allData = null;
var sessionSpendChart = null;

function toggleUserChart() {
    var wrap = document.getElementById('user-chart-wrap');
    var btn = document.getElementById('user-chart-toggle');
    var hidden = wrap.style.display === 'none';
    wrap.style.display = hidden ? 'block' : 'none';
    btn.textContent = hidden ? '隐藏' : '显示';
    localStorage.setItem('user-chart-visible', hidden ? '1' : '0');
    if (hidden && allData) renderSpendChart(allData);
}
(function() {
    if (localStorage.getItem('user-chart-visible') === '0') {
        document.getElementById('user-chart-wrap').style.display = 'none';
        document.getElementById('user-chart-toggle').textContent = '显示';
    }
})();

function loadUser() {
    fetchWithTimeout('/api/user?uid=' + encodeURIComponent(uid) + '&detail=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                document.getElementById('loading').innerHTML =
                    '<div class="loading"><div class="msg">用户未找到: ' + uid + '</div></div>';
                return;
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('user-content').style.display = 'block';
            allData = data;

            var name = data.user_name || '';
            var avatarUrl = data.avatar_url || '';
            setAvatar(name, avatarUrl);
            document.getElementById('user-name').textContent = name || '未知用户';

            /* 跳转到抖音主页按钮 */
            var douyinLink = document.getElementById('douyin-link');
            if (data.sec_uid) {
                douyinLink.href = 'https://www.douyin.com/user/' + data.sec_uid;
                douyinLink.style.display = '';
            }

            /* Meta tags */
            var metaEl = document.getElementById('user-meta');
            metaEl.innerHTML = '';
            if (data.user_id) {
                var idBadge = document.createElement('span');
                idBadge.className = 'badge badge-gray';
                idBadge.textContent = 'ID: ' + data.user_id;
                metaEl.appendChild(idBadge);
            }
            if (data.grade) {
                var gradeBadge = document.createElement('span');
                gradeBadge.className = 'badge badge-indigo';
                gradeBadge.textContent = data.grade;
                metaEl.appendChild(gradeBadge);
            }
            if (data.fans_club) {
                var clubs = data.fans_club.match(/\[粉丝团:[^\]]+?\sLv\d+\]/g);
                if (clubs && clubs.length > 0) {
                    clubs.forEach(function(c) {
                        var cb = document.createElement('span');
                        cb.className = 'badge badge-amber';
                        cb.textContent = c;
                        metaEl.appendChild(cb);
                    });
                } else {
                    // Support multiple clubs: "香奈儿 Lv20 迅猛龙 特蕾莎 Lv16"
                    // Each club ends with " LvN", followed by space or end
                    var clubsArr = [];
                    var re = /(.+? Lv\d+)\s*/g;
                    var m;
                    while ((m = re.exec(data.fans_club)) !== null) {
                        if (m[1]) clubsArr.push(m[1]);
                    }
                    if (clubsArr.length > 1) {
                        clubsArr.forEach(function(p) {
                            p = p.trim();
                            if (p) {
                                var cb = document.createElement('span');
                                cb.className = 'badge badge-amber';
                                cb.textContent = p;
                                metaEl.appendChild(cb);
                            }
                        });
                    } else {
                        // Single club display
                        var m = data.fans_club.match(/^(.+?)\s+Lv(\d+)$/);
                        if (m) {
                            var cb = document.createElement('span');
                            cb.className = 'badge badge-amber';
                            cb.textContent = m[1].trim() + ' Lv' + m[2];
                            metaEl.appendChild(cb);
                        } else {
                            var cb = document.createElement('span');
                            cb.className = 'badge badge-amber';
                            cb.textContent = data.fans_club;
                            metaEl.appendChild(cb);
                        }
                    }
                }
            } else {
                var noClub = document.createElement('span');
                noClub.className = 'badge badge-gray';
                noClub.textContent = '无粉丝团';
                metaEl.appendChild(noClub);
            }
            /* Notes & Tags display */
            if (data.notes) {
                var nBadge = document.createElement('span');
                nBadge.className = 'badge badge-gray';
                nBadge.textContent = '备注: ' + data.notes;
                nBadge.title = data.notes;
                nBadge.style.cssText = 'max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default;';
                metaEl.appendChild(nBadge);
            }
            if (data.tags) {
                data.tags.split(',').forEach(function(t) {
                    t = t.trim();
                    if (!t) return;
                    var tBadge = document.createElement('span');
                    tBadge.className = 'badge badge-blue';
                    tBadge.textContent = t;
                    metaEl.appendChild(tBadge);
                });
            }

            /* Populate notes editor */
            document.getElementById('notes-input').value = data.notes || '';
            document.getElementById('tags-input').value = data.tags || '';

            /* Stats */
            var sc = data.total_consume || 0;
            var latestSession = data.sessions && data.sessions.length > 0 ? data.sessions[0] : null;
            document.getElementById('stat-session-wave').textContent =
                latestSession ? (latestSession.consume || 0).toLocaleString() : '0';
            document.getElementById('stat-session-gifts').textContent =
                latestSession ? (latestSession.gift_count || 0) : '0';
            document.getElementById('stat-session-chats').textContent =
                latestSession ? (latestSession.chat_count || 0) : '0';
            document.getElementById('stat-total-wave').textContent = sc.toLocaleString();

            renderSessions(data);
            loadGifts();
            loadChats();
            renderTable(data);
            renderSpendChart(data);
        })
        .catch(function(err) {
            document.getElementById('loading').innerHTML =
                '<div class="loading"><div class="msg" style="color:var(--danger);">加载失败: ' + err.message + '</div></div>';
        });
}

function renderSessions(data) {
    var el = document.getElementById('session-list');
    el.innerHTML = '';
    if (!data.sessions || data.sessions.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">&#128237;</div><div>暂无记录</div></div>';
        return;
    }
    data.sessions.forEach(function(s) {
        var start = (s.start_time || '').substring(0, 10);
        var end = (s.end_time || '').substring(0, 10);
        var dateRange = start + (end && end !== start ? ' - ' + end : '');
        var timeRange = (s.start_time || '').substring(11, 19) + '-' + (s.end_time || '至今').substring(11, 19);
        var isCurrent = !s.end_time;

        var div = document.createElement('div');
        div.style.cssText = 'padding:12px 0;border-bottom:1px solid var(--border);';

        var header = document.createElement('div');
        header.style.cssText = 'cursor:pointer;user-select:none;';
        header.innerHTML =
            '<div style="display:flex;align-items:center;gap:8px;">' +
            '<span id="arrow-' + s.id + '" style="color:var(--text-muted);font-size:12px;transition:transform var(--transition-base);">&#9654;</span>' +
            '<span style="font-weight:600;font-size:14px;">' + dateRange + '</span>' +
            (isCurrent ? '<span style="font-size:11px;color:#e67e22;background:#fff3e0;padding:0 8px;border-radius:4px;">当前</span>' : '') +
            '</div>' +
            '<div style="font-size:12px;color:var(--text-muted);margin-left:28px;">' + timeRange + '</div>' +
            '<div style="font-size:13px;margin:4px 0 0 28px;color:var(--text);">' +
            (s.consume || 0).toLocaleString() + ' 音浪 <span class="text-muted">&#183;</span> ' +
            (s.gift_count || 0) + ' 件' +
            (s.chat_count ? ' <span class="text-muted">&#183;</span> ' + s.chat_count + ' 条发言' : '') +
            '</div>';
        div.appendChild(header);

        var body = document.createElement('div');
        body.style.cssText = 'margin:6px 0 0 28px;font-size:13px;display:none;';
        body.id = 'body-' + s.id;

        if (s.timeline && s.timeline.length > 0) {
            var count = 0;
            s.timeline.forEach(function(t) {
                if (currentFilter !== 'all' && t.type !== currentFilter) return;
                count++;
                var icon = t.type === 'gift' ? '&#127873;' : '&#128172;';
                var amt = t.amount ? parseInt(t.amount).toLocaleString() + ' 钻' : '';
                var timeStr = (t.time || '').length >= 16 ? (t.time || '').substring(5, 16) : (t.time || '').substring(11, 19);
                var anchorStr = s.anchor_name ? ' <span style="color:var(--text-muted);font-size:11px;">@' + s.anchor_name + '</span>' : '';
                var row = document.createElement('div');
                row.style.cssText = 'padding:4px 0;display:flex;gap:10px;align-items:center;';
                row.innerHTML =
                    '<span style="color:var(--text-muted);flex-shrink:0;width:70px;font-size:12px;">' + timeStr + '</span>' +
                    '<span style="flex-shrink:0;">' + icon + '</span>' +
                    '<span style="flex-shrink:0;display:flex;gap:4px;align-items:center;height:20px;">' +
                        (t.badge_url ? renderBadges(t.badge_url) : '') +
                    '</span>' +
                    '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;">' + t.content + anchorStr + '</span>' +
                    (amt ? '<span style="color:#e67e22;flex-shrink:0;font-weight:600;font-size:12px;">' + amt + '</span>' : '');
                body.appendChild(row);
            });
            if (count === 0) {
                body.style.display = 'none';
            }
        } else {
            body.innerHTML = '<div style="color:var(--text-muted);padding:4px 0;font-size:12px;">暂无记录</div>';
        }
        div.appendChild(body);

        header.addEventListener('click', function() {
            var b = document.getElementById('body-' + s.id);
            var a = document.getElementById('arrow-' + s.id);
            var hidden = b.style.display === 'none';
            b.style.display = hidden ? 'block' : 'none';
            a.style.transform = hidden ? 'rotate(90deg)' : 'rotate(0deg)';
        });

        el.appendChild(div);
    });
}

function loadGifts() {
    fetchWithTimeout('/api/user/' + encodeURIComponent(uid) + '/gifts')
        .then(function(r) { return r.json(); })
        .then(function(gifts) {
            renderGifts(gifts);
        })
        .catch(function(err) {
            document.getElementById('gift-table-body').innerHTML =
                '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--danger);">加载失败</td></tr>';
        });
}

function renderGifts(gifts) {
    var tbody = document.getElementById('gift-table-body');
    if (!gifts || gifts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);">暂无</td></tr>';
        return;
    }
    gifts.forEach(function(g) {
        var tr = document.createElement('tr');
        var dt = g.created_at || '';
        tr.innerHTML =
            '<td>' + (dt.length >= 16 ? dt.substring(5, 16).replace(' ', '<br>') : dt.substring(11, 19)) + '</td>' +
            '<td>' + (g.anchor_name || '') + '</td>' +
            '<td>' + (g.gift_name || '') + '</td>' +
            '<td>' + (g.gift_count || 0) + '</td>' +
            '<td>' + (g.diamond_total || 0) + '</td>' +
            '<td style="font-size:11px;color:var(--text-muted);">' + (g.grade || '') + '</td>' +
            '<td style="font-size:11px;color:var(--text-muted);">' + (g.fans_club || '') + '</td>';
        tbody.appendChild(tr);
    });
}

var chatPage = 1;
var chatSize = 50;
var chatTotal = 0;

function loadChats(page) {
    var p = page || 1;
    fetchWithTimeout('/api/chat?user_id=' + encodeURIComponent(uid) + '&page=' + p + '&size=' + chatSize)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            chatPage = data.page || p;
            chatTotal = data.total || 0;
            renderChats(data);
            renderChatPagination();
        })
        .catch(function(err) {
            document.getElementById('chat-table-body').innerHTML =
                '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--danger);">加载失败</td></tr>';
        });
}

function renderChats(data) {
    var tbody = document.getElementById('chat-table-body');
    if (!data.chats || data.chats.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);">暂无弹幕记录</td></tr>';
        return;
    }
    tbody.innerHTML = '';
    data.chats.forEach(function(c) {
        var tr = document.createElement('tr');
        var dt = c.time || '';
        tr.innerHTML =
            '<td>' + (dt.length >= 16 ? dt.substring(5, 16).replace(' ', '<br>') : dt.substring(11, 19)) + '</td>' +
            '<td>' + (c.anchor_name || '') + '</td>' +
            '<td style="max-width:400px;word-break:break-all;">' + (c.content || '') + '</td>' +
            '<td>' + (c.grade || '-') + '</td>' +
            '<td>' + (c.fans_club || '-') + '</td>';
        tbody.appendChild(tr);
    });
}

function renderChatPagination() {
    var el = document.getElementById('chat-pagination');
    if (!el) return;
    var totalPages = Math.ceil(chatTotal / chatSize);
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    var html = '';
    html += '<button onclick="loadChats(1)" ' + (chatPage <= 1 ? 'disabled' : '') +
        ' style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:12px;">首页</button>';
    html += '<button onclick="loadChats(' + (chatPage - 1) + ')" ' + (chatPage <= 1 ? 'disabled' : '') +
        ' style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:12px;">上一页</button>';
    html += '<span style="font-size:12px;color:var(--text-muted);padding:4px 8px;">第 ' + chatPage + ' / ' + totalPages + ' 页（共 ' + chatTotal + ' 条）</span>';
    html += '<button onclick="loadChats(' + (chatPage + 1) + ')" ' + (chatPage >= totalPages ? 'disabled' : '') +
        ' style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:12px;">下一页</button>';
    html += '<button onclick="loadChats(' + totalPages + ')" ' + (chatPage >= totalPages ? 'disabled' : '') +
        ' style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:12px;">末页</button>';
    el.innerHTML = html;
}

function exportChatCSV() {
    if (!uid) { showToast('用户ID为空', 'error'); return; }
    showCsvColumnSelector('/api/chat/csv?user_id=' + encodeURIComponent(uid),
        ['time', 'user_id', 'user_name', 'anchor_name', 'content', 'grade', 'fans_club', '链接']);
}

function renderSpendChart(data) {
    if (sessionSpendChart) { sessionSpendChart.destroy(); sessionSpendChart = null; }
    var sessions = (data.sessions || []).slice().reverse().slice(-15);
    if (sessions.length < 2) return;
    var labels = sessions.map(function(s) {
        return (s.start_time || '').substring(0, 10) + ' #' + s.id;
    });
    var values = sessions.map(function(s) { return s.consume || 0; });
    sessionSpendChart = new Chart(document.getElementById('session-spend-chart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{data: values, backgroundColor: '#6366f1', borderRadius: 4}]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {legend: {display: false}},
            scales: {
                x: {ticks: {font: {size: 10}}, grid: {display: false}},
                y: {beginAtZero: true, ticks: {font: {size: 10}, callback: function(v) { return v >= 10000 ? (v/10000).toFixed(1)+'w' : v.toLocaleString(); }}}
            }
        }
    });
}

function renderTable(data) {
    var tbody = document.getElementById('session-table-body');
    if (!data.sessions || data.sessions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted);">暂无</td></tr>';
        return;
    }
    data.sessions.forEach(function(s) {
        var start = (s.start_time || '').substring(0, 10);
        var end = (s.end_time || '').substring(0, 10);
        var dateRange = start + (end && end !== start ? ' - ' + end : '');
        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td>' + dateRange + '</td>' +
            '<td>' + (s.grade || '-') + '</td>' +
            '<td>' + (s.fans_club || '-') + '</td>' +
            '<td>' + (s.consume ? (s.consume / 10000).toFixed(1) + 'w' : '0') + '</td>' +
            '<td>' + (s.gift_count || 0) + '</td>' +
            '<td>' + (s.chat_count || 0) + '</td>';
        tbody.appendChild(tr);
    });
}

function renderTierBadges(value) {
    var tiers = [
        { threshold: 100000, cls: 'tier-100000', label: '10w+' },
        { threshold: 10000,  cls: 'tier-10000',  label: '1w+' },
        { threshold: 3000,   cls: 'tier-3000',   label: '3000+' },
        { threshold: 1000,   cls: 'tier-1000',   label: '1000+' }
    ];
    var html = '';
    tiers.forEach(function(t) {
        if (value >= t.threshold) {
            html += '<span class="tier-badge ' + t.cls + '">' + t.label + '</span>';
        }
    });
    return html;
}

function exportTimelineCSV() {
    if (!uid) { showToast('用户ID为空', 'error'); return; }
    showCsvColumnSelector('/api/user/' + encodeURIComponent(uid) + '/timeline/csv',
        ['time', 'type', 'anchor_name', 'content', 'amount', 'grade', '用户链接']);
}

function exportUserCSV() {
    if (!uid) { showToast('用户ID为空', 'error'); return; }
    showCsvColumnSelector('/api/user/' + encodeURIComponent(uid) + '/csv',
        ['user_id', 'user_name', 'grade', 'fans_club', 'session_id', 'anchor',
         'start_time', 'end_time', 'consume', 'gift_count', 'chat_count', '场次链接']);
}

loadUser();
</script>
{% endblock %}
