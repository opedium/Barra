{% extends "base.html" %}
{% block title %}升级记录{% endblock %}
{% block content %}
<style>
.upgrade-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-light);
}
.upgrade-item:last-child { border-bottom: none; }
.upgrade-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
}
.upgrade-icon.grade { background: linear-gradient(135deg,#f59e0b,#ef4444); color: #fff; }
.upgrade-icon.fansclub { background: linear-gradient(135deg,#06b6d4,#8b5cf6); color: #fff; }
.upgrade-body { flex: 1; min-width: 0; }
.upgrade-body .user { font-weight: 600; font-size: 14px; }
.upgrade-body .detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.upgrade-body .lv-change { font-weight: 700; color: var(--primary); }
.upgrade-time { font-size: 11px; color: var(--text-soft); white-space: nowrap; }
.type-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
.type-tab {
    padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -2px; user-select: none; transition: all var(--transition-fast);
}
.type-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.type-tab:hover { color: var(--primary); }
.scope-toggle { display: flex; gap: 4px; margin-bottom: 12px; }
.scope-btn {
    padding: 4px 14px; border: 1px solid var(--border); border-radius: 14px;
    font-size: 12px; cursor: pointer; background: transparent; color: var(--text-muted);
    transition: all var(--transition-fast);
}
.scope-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
</style>

<div class="card">
    <div class="flex-between" style="margin-bottom:12px;">
        <h2 style="margin-bottom:0;">⬆ 升级记录</h2>
        <div class="scope-toggle">
            <button class="scope-btn active" data-scope="session" onclick="switchScope('session')">当前场次</button>
            <button class="scope-btn" data-scope="all" onclick="switchScope('all')">全部</button>
        </div>
    </div>

    <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.6;">
        记录用户达到 <strong>财富等级 40 级</strong> 及以上升级，以及 <strong>粉丝团灯牌 15 级</strong> 及以上升级。
        数据从接入之时开始记录，历史升级不会追溯。
    </div>

    <div class="type-tabs">
        <span class="type-tab active" data-type="" onclick="switchType('')">全部</span>
        <span class="type-tab" data-type="grade" onclick="switchType('grade')">财富等级</span>
        <span class="type-tab" data-type="fansclub" onclick="switchType('fansclub')">粉丝团</span>
    </div>

    <div id="upgrade-list">
        <div class="text-muted" style="padding:20px;text-align:center;">加载中...</div>
    </div>
</div>

<script>
var CUR_TYPE = '';
var CUR_SCOPE = 'session';
var CUR_PAGE = 1;
var CUMULATIVE_ITEMS = 0;

function getActiveSessionId() {
    var p = new URLSearchParams(window.location.search);
    return p.get('session_id');
}

function switchType(type) {
    CUR_TYPE = type;
    CUR_PAGE = 1;
    CUMULATIVE_ITEMS = 0;
    document.querySelectorAll('.type-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.type === type);
    });
    loadUpgrades();
}

function switchScope(scope) {
    CUR_SCOPE = scope;
    CUR_PAGE = 1;
    CUMULATIVE_ITEMS = 0;
    document.querySelectorAll('.scope-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.scope === scope);
    });
    loadUpgrades();
}

function loadUpgrades(isAutoRefresh) {
    var el = document.getElementById('upgrade-list');
    if (!isAutoRefresh) {
        el.innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;">加载中...</div>';
    }

    var params = 'page=' + CUR_PAGE + '&min_level=0';
    if (CUR_TYPE) params += '&type=' + CUR_TYPE;
    if (CUR_SCOPE === 'session') {
        var sid = getActiveSessionId();
        if (sid) params += '&session_id=' + sid;
    }
    fetch('/api/upgrades?' + params)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (!d || !d.upgrades) {
                el.innerHTML = '<div style="color:var(--danger);padding:20px;text-align:center;">数据异常，请稍后重试</div>';
                return;
            }
            if (d.upgrades.length === 0) {
                if (CUR_PAGE === 1) {
                    el.innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;">暂无升级记录<br><span style="font-size:11px;">只有检测到用户从 &lt;40 级升到 &ge;40 级，或灯牌 &lt;15 级升到 &ge;15 级时才会记录</span></div>';
                }
                return;
            }
            var html = '';
            d.upgrades.forEach(function(u) {
                var icon = u.upgrade_type === 'grade' ? '&#x2B50;' : '&#x1F4A1;';
                var iconCls = u.upgrade_type === 'grade' ? 'grade' : 'fansclub';
                var typeLabel = u.upgrade_type === 'grade' ? '财富等级' : '粉丝团';
                var avatarHtml = u.avatar_url
                    ? '<img src="' + u.avatar_url + '" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover;" referrerpolicy="no-referrer">'
                    : '<div class="upgrade-icon ' + iconCls + '">' + icon + '</div>';
                html += '<div class="upgrade-item">'
                    + avatarHtml
                    + '<div class="upgrade-body">'
                    + '<div class="user"><a href="/user?uid=' + u.user_id + '" style="color:inherit;text-decoration:none;">' + u.user_name + '</a></div>'
                    + '<div class="detail">' + typeLabel + ' <span class="lv-change">' + u.from_level + ' → ' + u.to_level + '</span>'
                    + (u.anchor_name ? ' &middot; ' + u.anchor_name : '')
                    + '</div></div>'
                    + '<div class="upgrade-time" title="' + u.created_at + '">' + (u.created_at || '').substring(11, 16) + '</div>'
                    + '</div>';
            });
            CUMULATIVE_ITEMS += d.upgrades.length;
            if (CUR_PAGE === 1) {
                el.innerHTML = html;
            } else {
                el.innerHTML = el.innerHTML + html;
            }
            if (d.total > CUMULATIVE_ITEMS) {
                el.innerHTML += '<div style="text-align:center;padding:12px;"><button class="scope-btn" onclick="CUR_PAGE++;loadUpgrades()" style="border-color:var(--primary);color:var(--primary);">加载更多</button></div>';
            }
        })
        .catch(function() {
            if (CUR_PAGE === 1) {
                el.innerHTML = '<div style="color:var(--danger);padding:20px;text-align:center;">加载失败</div>';
            }
        });
}

loadUpgrades();
setInterval(function() { loadUpgrades(true); }, 30000);
</script>
{% endblock %}
