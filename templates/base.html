<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script>
        (function() {
            var t = localStorage.getItem('theme');
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
    <title>{% block title %}弹幕后台{% endblock %} · StreamDash</title>
    <style>
        /* ================================================================
           DESIGN TOKENS
           ================================================================ */
        :root {
            --bg: #f0f2f5;
            --bg-soft: #f8fafc;
            --card: #ffffff;
            --nav-bg: #0f172a;
            --nav-hover: rgba(255,255,255,0.07);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #eef2ff;
            --primary-glow: rgba(99,102,241,0.15);
            --text: #1e293b;
            --text-muted: #64748b;
            --text-soft: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --danger: #ef4444;
            --danger-bg: #fce4ec;
            --font: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace;
            --radius: 10px;
            --radius-sm: 6px;
            --radius-lg: 14px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --nav-height: 58px;
            --transition-fast: 0.15s ease;
            --transition-base: 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            --transition-slow: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ================================================================
           RESET & BASE
           ================================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 15px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            opacity: 0;
            animation: bodyFadeIn 0.3s ease forwards;
        }
        @keyframes bodyFadeIn { to { opacity: 1; } }
        a { color: var(--primary); text-decoration: none; transition: color var(--transition-fast); }
        a:hover { color: var(--primary-dark); }
        img { max-width: 100%; height: auto; display: block; }

        /* ================================================================
           NAVIGATION
           ================================================================ */
        .nav {
            background: var(--nav-bg);
            color: #fff;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 2px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
            user-select: none;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            margin-right: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .nav-brand .brand-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }
        .nav-brand .brand-text {
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 1px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 13px;
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            white-space: nowrap;
            position: relative;
        }
        .nav-links a:hover {
            color: #fff;
            background: var(--nav-hover);
        }
        .nav-links a.active {
            color: #fff;
            background: rgba(99,102,241,0.18);
        }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: 1px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px rgba(99,102,241,0.7);
        }

        /* ── Nav dropdown ── */
        .nav-dropdown {
            position: relative;
            display: inline-flex;
        }
        .nav-dropdown > a {
            cursor: default;
        }
        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 100px;
            background: var(--nav-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 0;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .nav-dropdown-content a {
            display: block;
            padding: 8px 16px;
            font-size: 13px;
            white-space: nowrap;
        }
        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }

        .nav-search {
            margin-left: auto;
            display: flex;
            gap: 6px;
            position: relative;
        }
        .nav-search .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .nav-search .search-wrap .search-icon {
            position: absolute;
            left: 10px;
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
            opacity: 0.5;
        }
        .nav-search input {
            border: none;
            border-radius: var(--radius-sm);
            padding: 6px 12px 6px 30px;
            font-size: 13px;
            width: 190px;
            background: #1e293b;
            color: #fff;
            outline: none;
            transition: width var(--transition-base), background var(--transition-fast);
        }
        .nav-search input::placeholder { color: var(--text-soft); font-size: 12px; }
        .nav-search input:focus { width: 250px; background: #334155; }
        .nav-search button {
            border: none;
            border-radius: var(--radius-sm);
            padding: 6px 14px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background var(--transition-fast), transform 0.1s;
        }
        .nav-search button:hover { background: var(--primary-dark); }
        .nav-search button:active { transform: scale(0.96); }

        /* ── Search Autocomplete ── */
        .search-autocomplete {
            position: absolute; top: 100%; right: 0; width: 340px;
            max-height: 360px; overflow-y: auto;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow-lg);
            z-index: 200; display: none; margin-top: 4px;
        }
        .search-autocomplete.open { display: block; }
        .search-autocomplete .ac-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer;
            transition: background var(--transition-fast);
            border-bottom: 1px solid var(--border-light);
        }
        .search-autocomplete .ac-item:last-child { border-bottom: none; }
        .search-autocomplete .ac-item:hover,
        .search-autocomplete .ac-item.active { background: var(--primary-light); }
        .search-autocomplete .ac-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff;
            flex-shrink: 0; overflow: hidden;
        }
        .search-autocomplete .ac-avatar img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
        }
        .search-autocomplete .ac-info { min-width: 0; flex: 1; }
        .search-autocomplete .ac-name {
            font-weight: 600; font-size: 13px; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .search-autocomplete .ac-id {
            font-size: 11px; color: var(--text-muted); font-family: var(--font-mono);
        }
        .search-autocomplete .ac-empty {
            padding: 16px; text-align: center; color: var(--text-soft); font-size: 13px;
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            transition: background var(--transition-fast);
            line-height: 1;
        }
        .nav-toggle:hover { background: rgba(255,255,255,0.08); }

        /* ================================================================
           CONTAINER
           ================================================================ */
        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px 20px;
            animation: containerIn var(--transition-slow) ease forwards;
        }
        @keyframes containerIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: none; }
        }

        /* ================================================================
           CARDS
           ================================================================ */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition-base), transform var(--transition-base);
        }
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        .card h2 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 .sub {
            font-weight: 400;
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* ================================================================
           STATS ROW
           ================================================================ */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 4px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 14px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            transition: transform var(--transition-base), box-shadow var(--transition-base);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary-light), transparent 60%);
            opacity: 0;
            transition: opacity var(--transition-base);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card:hover::before { opacity: 1; }
        .stat-card .num {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            font-family: var(--font-mono);
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }
        .stat-card .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            position: relative;
            z-index: 1;
        }

        /* ================================================================
           TABLES
           ================================================================ */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -4px;
            padding: 0 4px;
            border-radius: var(--radius-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: var(--bg);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            transition: background var(--transition-fast);
        }
        tbody tr:nth-child(even) td { background: #f8fafc; }
        tbody tr:hover td { background: var(--primary-light); }
        tbody tr { transition: background var(--transition-fast); }

        /* ================================================================
           FILTER BAR
           ================================================================ */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar select,
        .filter-bar input,
        .filter-bar button {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            background: var(--card);
            color: var(--text);
            outline: none;
            height: 34px;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .filter-bar button {
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            border-color: var(--primary);
            font-weight: 500;
            transition: background var(--transition-fast), transform 0.1s;
        }
        .filter-bar button:hover { background: var(--primary-dark); }
        .filter-bar button:active { transform: scale(0.96); }
        .filter-bar .btn-group {
            display: flex;
            gap: 0;
            height: 34px;
        }
        .filter-bar .btn-group button {
            border-radius: 0;
            background: var(--card);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-right: none;
            height: 100%;
            font-size: 12px;
            transition: background var(--transition-fast), color var(--transition-fast);
        }
        .filter-bar .btn-group button:first-child {
            border-radius: var(--radius-sm) 0 0 var(--radius-sm);
        }
        .filter-bar .btn-group button:last-child {
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            border-right: 1px solid var(--border);
        }
        .filter-bar .btn-group button.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .filter-bar .btn-group button.active + button {
            border-left-color: var(--primary);
        }
        .filter-bar .btn-group button:not(.active):hover {
            background: var(--primary-light);
        }

        /* ================================================================
           BADGES
           ================================================================ */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.4;
        }
        .badge-green { background: var(--success-bg); color: #065f46; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-red { background: var(--danger-bg); color: #c62828; }
        .badge-amber { background: var(--warning-bg); color: #92400e; }
        .badge-gray { background: #f1f5f9; color: #475569; }
        .badge-indigo { background: var(--primary-light); color: var(--primary-dark); }

        /* ================================================================
           PAGINATION
           ================================================================ */
        .pagination {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 14px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .pagination a {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: all var(--transition-fast);
            min-width: 32px;
            text-align: center;
        }
        .pagination a:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .pagination a.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .pagination span {
            color: var(--text-muted);
            font-size: 12px;
        }
        .pagination .info {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ================================================================
           LOADING STATE
           ================================================================ */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 14px;
            gap: 14px;
        }
        .loading .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .loading .spinner-ring {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .msg { color: var(--text-muted); }

        /* ================================================================
           EMPTY STATE
           ================================================================ */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }
        .empty-state .icon {
            font-size: 34px;
            margin-bottom: 10px;
            opacity: 0.55;
        }
        .empty-state .hint {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.65;
            margin-top: 4px;
        }

        /* ================================================================
           TOAST
           ================================================================ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(16px) scale(0.96);
            transition: opacity var(--transition-slow), transform var(--transition-slow);
            box-shadow: var(--shadow-lg);
            pointer-events: auto;
            max-width: 380px;
            position: relative;
            overflow: hidden;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .toast::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
        }
        .toast.toast-success::before { background: var(--success); }
        .toast.toast-error::before { background: var(--danger); }
        .toast.toast-warning::before { background: var(--warning); }
        .toast.toast-info::before { background: var(--primary); }

        /* ================================================================
           MODAL OVERLAY
           ================================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.55);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-base);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-dialog {
            background: var(--card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 420px;
            max-width: 94vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(12px);
            transition: transform var(--transition-base);
        }
        .modal-overlay.open .modal-dialog {
            transform: none;
        }
        .modal-header {
            padding: 18px 22px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h3 {
            font-size: 15px;
            font-weight: 700;
            margin: 0;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 4px;
            transition: color var(--transition-fast);
            line-height: 1;
        }
        .modal-close:hover { color: var(--danger); }
        .modal-body {
            padding: 16px 22px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-body .col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .modal-body .col-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            transition: background var(--transition-fast);
            user-select: none;
        }
        .modal-body .col-item:hover { background: var(--primary-light); }
        .modal-body .col-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }
        .modal-body .col-item label {
            cursor: pointer;
            flex: 1;
        }
        .modal-footer {
            padding: 12px 22px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .modal-footer .btn-group-sm {
            display: flex;
            gap: 6px;
        }
        .modal-footer button {
            padding: 7px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            transition: all var(--transition-fast);
        }
        .modal-footer button:hover { background: var(--bg); }
        .modal-footer button.btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .modal-footer button.btn-primary:hover { background: var(--primary-dark); }
        .modal-footer button.btn-ghost {
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 12px;
            padding: 7px 10px;
        }
        .modal-footer button.btn-ghost:hover { color: var(--text); }

        /* ================================================================
           TIER BADGES
           ================================================================ */
        .tier-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin: 0 2px;
            letter-spacing: 0.02em;
        }
        .tier-1000 { background: #e0f2fe; color: #0369a1; }
        .tier-3000 { background: #dcfce7; color: #15803d; }
        .tier-10000 { background: var(--warning-bg); color: #b45309; }
        .tier-100000 { background: var(--danger-bg); color: #be123c; }

        /* ================================================================
           RANK STYLES
           ================================================================ */
        .rank-1 { color: #f59e0b; font-weight: 700; }
        .rank-2 { color: #94a3b8; font-weight: 700; }
        .rank-3 { color: #cd7f32; font-weight: 700; }

        /* ================================================================
           SECTION DIVIDER
           ================================================================ */
        .section-divider {
            height: 1px;
            background: linear-gradient(to right, var(--border), transparent);
            margin: 20px 0 16px;
        }

        /* ================================================================
           UTILITY
           ================================================================ */
        .text-muted { color: var(--text-muted); }
        .text-mono { font-family: var(--font-mono); }
        .text-sm { font-size: 12px; }
        .text-xs { font-size: 11px; }
        .text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 16px; }
        .mb-1 { margin-bottom: 8px; }
        .gap-1 { gap: 8px; }
        .gap-2 { gap: 16px; }
        .flex { display: flex; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .flex-between { display: flex; align-items: center; justify-content: space-between; }
        .flex-wrap { flex-wrap: wrap; }
        .w-full { width: 100%; }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 900px) {
            .nav-links a { padding: 6px 9px; font-size: 12px; }
            .nav-search input { width: 140px; }
            .nav-search input:focus { width: 170px; }
            .stats-row { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
            .container { padding: 18px 16px; }
        }
        @media (max-width: 640px) {
            html { font-size: 14px; }
            .nav {
                flex-wrap: wrap;
                height: auto;
                min-height: var(--nav-height);
                padding: 8px 14px;
                gap: 6px;
            }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                padding: 8px 0 4px;
                gap: 2px;
            }
            .nav-links.open { display: flex; }
            .nav-links a {
                width: 100%;
                padding: 10px 12px;
                font-size: 14px;
            }
            .nav-links a.active::after {
                left: 14px;
                top: 50%;
                bottom: auto;
                transform: translateY(-50%);
                width: 5px;
                height: 5px;
            }
            .nav-dropdown {
                width: 100%;
                flex-direction: column;
            }
            .nav-dropdown-content {
                position: static;
                display: flex;
                flex-direction: column;
                box-shadow: none;
                border: none;
                border-radius: 0;
                padding: 0 0 0 16px;
                background: transparent;
            }
            .nav-dropdown-content a {
                font-size: 14px;
                padding: 8px 12px;
            }
            .nav-toggle { display: block; }
            .nav-search { margin-left: 0; width: 100%; }
            .nav-search input { flex: 1; width: auto; }
            .nav-search input:focus { width: auto; }
            .nav-search .search-icon { left: 12px; }
            .nav-search input { padding-left: 32px; }
            .container { padding: 12px; }
            .card { padding: 14px 16px; border-radius: 8px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-card { padding: 12px 10px; }
            .stat-card .num { font-size: 20px; }
            th, td { padding: 8px 8px; font-size: 12px; }
            .filter-bar { gap: 6px; }
            .filter-bar select,
            .filter-bar input,
            .filter-bar button {
                font-size: 12px;
                padding: 5px 8px;
                height: 30px;
            }
            .filter-bar .btn-group { height: 30px; }
            .toast-container {
                left: 12px;
                right: 12px;
                bottom: 12px;
            }
            .toast {
                max-width: none;
                text-align: center;
            }
        }
    </style>
    <style id="theme-dark">
        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-soft: #1e293b;
            --card: #1e293b;
            --nav-bg: #020617;
            --nav-hover: rgba(255,255,255,0.06);
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --primary-light: #1e1b4b;
            --primary-glow: rgba(129,140,248,0.12);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-soft: #64748b;
            --border: #334155;
            --border-light: #1e293b;
            --success: #34d399;
            --success-bg: #064e3b;
            --warning: #fbbf24;
            --warning-bg: #78350f;
            --danger: #f87171;
            --danger-bg: #7f1d1d;
            --font: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace;
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 2px 4px -1px rgba(0,0,0,0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5), 0 4px 6px -2px rgba(0,0,0,0.25);
        }
        [data-theme="dark"] .nav-search input { background: #0f172a; }
        [data-theme="dark"] .nav-links a.active { background: rgba(129,140,248,0.15); }
        [data-theme="dark"] tbody tr:nth-child(even) td { background: #1a2332; }
        [data-theme="dark"] tbody tr:hover td { background: #1e1b4b; }
        [data-theme="dark"] .card-live { background: linear-gradient(135deg, #064e3b, var(--card) 50%); }
        [data-theme="dark"] .toast { background: #334155; }
        [data-theme="dark"] .badge-gray { background: #334155; color: #94a3b8; }
        [data-theme="dark"] .user-header-card { background: linear-gradient(135deg, #1e1b4b 0%, var(--card) 60%); }
        [data-theme="dark"] .filter-bar select,
        [data-theme="dark"] .filter-bar input,
        [data-theme="dark"] .filter-bar button { background: var(--card); color: var(--text); }
        [data-theme="dark"] .filter-bar .btn-group button { background: var(--card); }
        [data-theme="dark"] .filter-bar .btn-group button.active { background: var(--primary); }
        [data-theme="dark"] #data-table tbody tr:has(> td.rank-1) td { background: #422006 !important; }
        [data-theme="dark"] #data-table tbody tr:has(> td.rank-2) td { background: #1e293b !important; }
        [data-theme="dark"] #data-table tbody tr:has(> td.rank-3) td { background: #431407 !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        /* ── Fetch with Timeout (must load before child template scripts) ── */
        function fetchWithTimeout(url, options, timeoutMs) {
            timeoutMs = timeoutMs || 15000;
            var controller = new AbortController();
            var signal = controller.signal;
            var fetchOptions = options || {};
            fetchOptions.signal = signal;
            var timeoutId = setTimeout(function() {
                controller.abort();
            }, timeoutMs);
            return fetch(url, fetchOptions).then(function(response) {
                clearTimeout(timeoutId);
                return response;
            }).catch(function(err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    throw new Error('请求超时，请检查网络连接');
                }
                throw err;
            });
        }
    </script>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <span class="brand-icon">&#9650;</span>
            <span class="brand-text">StreamDash</span>
        </div>
        <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')" aria-label="Toggle navigation">&#9776;</button>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">仪表盘</a>
            <a href="/leaderboard" class="{% if request.path == '/leaderboard' %}active{% endif %}">积分榜</a>
            <div class="nav-dropdown">
                <a class="{% if request.path in ['/chat','/anonymous','/upgrades'] %}active{% endif %}">用户 &#9662;</a>
                <div class="nav-dropdown-content">
                    <a href="/chat">弹幕</a>
                    <a href="/anonymous">神秘人</a>
                    <a href="/upgrades">升级</a>
                </div>
            </div>
            <a href="/sessions" class="{% if request.path == '/sessions' %}active{% endif %}">场次</a>
            <a href="/compare" class="{% if request.path == '/compare' %}active{% endif %}">对比</a>
            <div class="nav-dropdown">
                <a class="{% if request.path in ['/audit','/gift-prices'] %}active{% endif %}">审计 &#9662;</a>
                <div class="nav-dropdown-content">
                    <a href="/audit">诊断</a>
                    <a href="/gift-prices">礼物价格</a>
                </div>
            </div>
            <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">设置</a>
            {% if auth_enabled %}<a href="/logout" style="color:#f87171;">&#10149; 登出</a>{% endif %}
        </div>
        <div class="nav-search">
            <div class="search-wrap" style="position:relative;">
                <span class="search-icon">&#128269;</span>
                <input name="uid" id="search-input" placeholder="搜索用户ID或昵称..." autocomplete="off"
                       oninput="handleSearchInput(this.value)"
                       onkeydown="handleSearchKeydown(event)"
                       onfocus="handleSearchFocus()">
                <div class="search-autocomplete" id="search-dropdown"></div>
            </div>
            <button type="button" onclick="return doSearch(document.getElementById('search-input').value.trim())">搜索</button>
        </div>
        <button id="theme-toggle" onclick="toggleTheme()" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:color var(--transition-fast);margin-left:6px;" title="切换主题" aria-label="切换暗色/亮色模式">&#9728;&#65039;</button>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <!-- CSV Column Selector Modal -->
    <div class="modal-overlay" id="csv-modal">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3>&#128196; 选择导出列</h3>
                <button class="modal-close" onclick="closeCsvModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="col-grid" id="csv-modal-cols"></div>
            </div>
            <div class="modal-footer">
                <div class="btn-group-sm">
                    <button class="btn-ghost" onclick="csvModalSelectAll()">全选</button>
                    <button class="btn-ghost" onclick="csvModalDeselectAll()">取消全选</button>
                </div>
                <button class="btn-primary" id="csv-modal-export" onclick="csvModalExport()">&#x2B06; 导出</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script>
        /* ── Dark Mode ── */
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? '' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next || 'light');
            var btn = document.getElementById('theme-toggle');
            if (btn) {
                btn.innerHTML = next === 'dark' ? '&#127769;' : '&#9728;&#65039;';
            }
        }
        (function() {
            var btn = document.getElementById('theme-toggle');
            if (btn && document.documentElement.getAttribute('data-theme') === 'dark') {
                btn.innerHTML = '&#127769;';
            }
        })();

        /* ── Toast System ── */
        function showToast(msg, type) {
            var container = document.getElementById('toast-container');
            var t = document.createElement('div');
            t.className = 'toast' + (type ? ' toast-' + type : '');
            t.textContent = msg;
            container.appendChild(t);
            /* Force reflow then show */
            t.offsetHeight;
            t.classList.add('show');
            t._timer = setTimeout(function() {
                t.classList.remove('show');
                setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 400);
            }, 3000);
        }

        /* ── Nav Search ── */
        function doSearch(q) {
            if (!q) return false;
            hideDropdown();
            if (/^\d{6,}$/.test(q)) {
                window.location.href = '/user?uid=' + encodeURIComponent(q);
                return false;
            }
            fetchWithTimeout('/api/search?q=' + encodeURIComponent(q) + '&size=5')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.users && d.users.length >= 1) {
                        window.location.href = '/user?uid=' + d.users[0].user_id;
                    } else {
                        window.location.href = '/user?uid=' + encodeURIComponent(q);
                    }
                })
                .catch(function() {
                    window.location.href = '/user?uid=' + encodeURIComponent(q);
                });
            return false;
        }

        /* ── Search Autocomplete ── */
        var _searchTimer = null;
        var _searchActiveIndex = -1;
        var _searchResults = [];
        var _searchVisible = false;

        function handleSearchInput(val) {
            clearTimeout(_searchTimer);
            _searchActiveIndex = -1;
            if (!val || val.trim().length < 1) { hideDropdown(); return; }
            _searchTimer = setTimeout(function() {
                fetchWithTimeout('/api/search?q=' + encodeURIComponent(val.trim()) + '&size=5', {}, 5000)
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        _searchResults = d.users || [];
                        renderDropdown(_searchResults, val.trim());
                    })
                    .catch(function() { hideDropdown(); });
            }, 300);
        }

        function renderDropdown(users, query) {
            var dd = document.getElementById('search-dropdown');
            if (!users || users.length === 0) {
                dd.innerHTML = '<div class="ac-empty">未找到匹配用户</div>';
                dd.classList.add('open');
                _searchVisible = true;
                return;
            }
            var html = '';
            users.forEach(function(u, i) {
                var avatarContent = u.avatar_url
                    ? '<img src="' + u.avatar_url + '" onerror="this.parentElement.textContent=\'' + (u.user_name || '?').charAt(0).toUpperCase() + '\'">'
                    : (u.user_name || '?').charAt(0).toUpperCase();
                html += '<div class="ac-item" data-index="' + i + '" onmousedown="selectSearchResult(' + i + ')" onmouseenter="highlightSearchItem(' + i + ')">' +
                    '<div class="ac-avatar">' + avatarContent + '</div>' +
                    '<div class="ac-info">' +
                        '<div class="ac-name">' + highlightMatch(u.user_name, query) + '</div>' +
                        '<div class="ac-id">' + u.user_id + '</div>' +
                    '</div>' +
                    '<div style="font-size:11px;color:var(--text-muted);">' + ((u.consume || u.total_consume || 0)).toLocaleString() + ' 音浪</div>' +
                '</div>';
            });
            dd.innerHTML = html;
            dd.classList.add('open');
            _searchVisible = true;
        }

        function highlightMatch(text, query) {
            if (!text || !query) return text || '';
            var idx = text.toLowerCase().indexOf(query.toLowerCase());
            if (idx < 0) return text;
            return text.substring(0, idx) +
                '<b style="color:var(--primary);">' +
                text.substring(idx, idx + query.length) + '</b>' +
                text.substring(idx + query.length);
        }

        function handleSearchKeydown(e) {
            if (!_searchVisible) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                _searchActiveIndex = Math.min(_searchActiveIndex + 1, _searchResults.length - 1);
                highlightSearchItem(_searchActiveIndex);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                _searchActiveIndex = Math.max(_searchActiveIndex - 1, 0);
                highlightSearchItem(_searchActiveIndex);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (_searchActiveIndex >= 0 && _searchResults[_searchActiveIndex]) {
                    selectSearchResult(_searchActiveIndex);
                } else {
                    doSearch(document.getElementById('search-input').value.trim());
                }
            } else if (e.key === 'Escape') {
                hideDropdown();
            }
        }

        function highlightSearchItem(index) {
            _searchActiveIndex = index;
            document.querySelectorAll('#search-dropdown .ac-item').forEach(function(el) {
                el.classList.toggle('active', parseInt(el.dataset.index) === index);
            });
        }

        function selectSearchResult(index) {
            var u = _searchResults[index];
            if (u) { window.location.href = '/user?uid=' + u.user_id; }
        }

        function handleSearchFocus() {
            var val = document.getElementById('search-input').value.trim();
            if (val && _searchResults.length > 0) {
                document.getElementById('search-dropdown').classList.add('open');
                _searchVisible = true;
            }
        }

        function hideDropdown() {
            document.getElementById('search-dropdown').classList.remove('open');
            _searchVisible = false;
            _searchActiveIndex = -1;
        }

        document.addEventListener('click', function(e) {
            var dd = document.getElementById('search-dropdown');
            var input = document.getElementById('search-input');
            if (dd && input && !input.contains(e.target) && !dd.contains(e.target)) {
                hideDropdown();
            }
        });

        /* ── Close mobile nav on link click ── */
        document.querySelectorAll('.nav-links a').forEach(function(a) {
            if (!a.getAttribute('href')) return;
            a.addEventListener('click', function() {
                var navLinks = document.querySelector('.nav-links');
                if (navLinks) navLinks.classList.remove('open');
            });
        });
        document.querySelectorAll('.nav-dropdown > a').forEach(function(a) {
            a.addEventListener('click', function(e) {
                var content = this.nextElementSibling;
                if (content && content.classList.contains('nav-dropdown-content')) {
                    content.style.display = content.style.display === 'block' ? '' : 'block';
                }
            });
        });

        /* ── CSV Column Selector Modal ── */
        var _csvExportUrl = '';
        function showCsvColumnSelector(url, columns) {
            _csvExportUrl = url;
            var grid = document.getElementById('csv-modal-cols');
            grid.innerHTML = '';
            columns.forEach(function(col) {
                var item = document.createElement('div');
                item.className = 'col-item';
                var id = 'csv-col-' + col.replace(/[^a-zA-Z0-9一-鿿]/g, '_');
                item.innerHTML =
                    '<input type="checkbox" id="' + id + '" value="' + col + '" checked>' +
                    '<label for="' + id + '">' + col + '</label>';
                item.addEventListener('click', function(e) {
                    if (e.target.tagName !== 'INPUT') {
                        var cb = item.querySelector('input[type="checkbox"]');
                        cb.checked = !cb.checked;
                    }
                });
                grid.appendChild(item);
            });
            document.getElementById('csv-modal').classList.add('open');
        }
        function closeCsvModal() {
            document.getElementById('csv-modal').classList.remove('open');
        }
        function csvModalSelectAll() {
            document.querySelectorAll('#csv-modal-cols input[type="checkbox"]').forEach(function(cb) { cb.checked = true; });
        }
        function csvModalDeselectAll() {
            document.querySelectorAll('#csv-modal-cols input[type="checkbox"]').forEach(function(cb) { cb.checked = false; });
        }
        function csvModalExport() {
            var checked = [];
            document.querySelectorAll('#csv-modal-cols input[type="checkbox"]:checked').forEach(function(cb) {
                checked.push(cb.value);
            });
            if (checked.length === 0) {
                showToast('请至少选择一列', 'warning');
                return;
            }
            var sep = _csvExportUrl.indexOf('?') === -1 ? '?' : '&';
            window.location.href = _csvExportUrl + sep + 'cols=' + encodeURIComponent(checked.join(','));
            closeCsvModal();
        }
        /* Close modal on overlay click */
        document.getElementById('csv-modal').addEventListener('click', function(e) {
            if (e.target === this) closeCsvModal();
        });
        /* Close modal on Escape key */
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeCsvModal();
        });
    </script>
</body>
</html>
