<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}弹幕后台{% endblock %} · StreamDash</title>
    <style>
        /* ================================================================
           DESIGN TOKENS
           ================================================================ */
        :root {
            --bg: #f0f2f5;
            --bg-soft: #f8fafc;
            --card: #ffffff;
            --nav-bg: #0f172a;
            --nav-hover: rgba(255,255,255,0.07);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #eef2ff;
            --primary-glow: rgba(99,102,241,0.15);
            --text: #1e293b;
            --text-muted: #64748b;
            --text-soft: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --danger: #ef4444;
            --danger-bg: #fce4ec;
            --font: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace;
            --radius: 10px;
            --radius-sm: 6px;
            --radius-lg: 14px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --nav-height: 58px;
            --transition-fast: 0.15s ease;
            --transition-base: 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            --transition-slow: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ================================================================
           RESET & BASE
           ================================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 15px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            opacity: 0;
            animation: bodyFadeIn 0.3s ease forwards;
        }
        @keyframes bodyFadeIn { to { opacity: 1; } }
        a { color: var(--primary); text-decoration: none; transition: color var(--transition-fast); }
        a:hover { color: var(--primary-dark); }
        img { max-width: 100%; height: auto; display: block; }

        /* ================================================================
           NAVIGATION
           ================================================================ */
        .nav {
            background: var(--nav-bg);
            color: #fff;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 2px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
            user-select: none;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            margin-right: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .nav-brand .brand-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }
        .nav-brand .brand-text {
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 1px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 13px;
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            white-space: nowrap;
            position: relative;
        }
        .nav-links a:hover {
            color: #fff;
            background: var(--nav-hover);
        }
        .nav-links a.active {
            color: #fff;
            background: rgba(99,102,241,0.18);
        }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: 1px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px rgba(99,102,241,0.7);
        }
        .nav-search {
            margin-left: auto;
            display: flex;
            gap: 6px;
            position: relative;
        }
        .nav-search .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .nav-search .search-wrap .search-icon {
            position: absolute;
            left: 10px;
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
            opacity: 0.5;
        }
        .nav-search input {
            border: none;
            border-radius: var(--radius-sm);
            padding: 6px 12px 6px 30px;
            font-size: 13px;
            width: 190px;
            background: #1e293b;
            color: #fff;
            outline: none;
            transition: width var(--transition-base), background var(--transition-fast);
        }
        .nav-search input::placeholder { color: var(--text-soft); font-size: 12px; }
        .nav-search input:focus { width: 250px; background: #334155; }
        .nav-search button {
            border: none;
            border-radius: var(--radius-sm);
            padding: 6px 14px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background var(--transition-fast), transform 0.1s;
        }
        .nav-search button:hover { background: var(--primary-dark); }
        .nav-search button:active { transform: scale(0.96); }
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            transition: background var(--transition-fast);
            line-height: 1;
        }
        .nav-toggle:hover { background: rgba(255,255,255,0.08); }

        /* ================================================================
           CONTAINER
           ================================================================ */
        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px 20px;
            animation: containerIn var(--transition-slow) ease both;
        }
        @keyframes containerIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================================================================
           CARDS
           ================================================================ */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition-base), transform var(--transition-base);
        }
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        .card h2 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 .sub {
            font-weight: 400;
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* ================================================================
           STATS ROW
           ================================================================ */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 4px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 14px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            transition: transform var(--transition-base), box-shadow var(--transition-base);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary-light), transparent 60%);
            opacity: 0;
            transition: opacity var(--transition-base);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card:hover::before { opacity: 1; }
        .stat-card .num {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            font-family: var(--font-mono);
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }
        .stat-card .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            position: relative;
            z-index: 1;
        }

        /* ================================================================
           TABLES
           ================================================================ */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -4px;
            padding: 0 4px;
            border-radius: var(--radius-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: var(--bg);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            transition: background var(--transition-fast);
        }
        tbody tr:nth-child(even) td { background: #f8fafc; }
        tbody tr:hover td { background: var(--primary-light); }
        tbody tr { transition: background var(--transition-fast); }

        /* ================================================================
           FILTER BAR
           ================================================================ */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar select,
        .filter-bar input,
        .filter-bar button {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            background: var(--card);
            color: var(--text);
            outline: none;
            height: 34px;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .filter-bar button {
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            border-color: var(--primary);
            font-weight: 500;
            transition: background var(--transition-fast), transform 0.1s;
        }
        .filter-bar button:hover { background: var(--primary-dark); }
        .filter-bar button:active { transform: scale(0.96); }
        .filter-bar .btn-group {
            display: flex;
            gap: 0;
            height: 34px;
        }
        .filter-bar .btn-group button {
            border-radius: 0;
            background: var(--card);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-right: none;
            height: 100%;
            font-size: 12px;
            transition: background var(--transition-fast), color var(--transition-fast);
        }
        .filter-bar .btn-group button:first-child {
            border-radius: var(--radius-sm) 0 0 var(--radius-sm);
        }
        .filter-bar .btn-group button:last-child {
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            border-right: 1px solid var(--border);
        }
        .filter-bar .btn-group button.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .filter-bar .btn-group button.active + button {
            border-left-color: var(--primary);
        }
        .filter-bar .btn-group button:not(.active):hover {
            background: var(--primary-light);
        }

        /* ================================================================
           BADGES
           ================================================================ */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.4;
        }
        .badge-green { background: var(--success-bg); color: #065f46; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-red { background: var(--danger-bg); color: #c62828; }
        .badge-amber { background: var(--warning-bg); color: #92400e; }
        .badge-gray { background: #f1f5f9; color: #475569; }
        .badge-indigo { background: var(--primary-light); color: var(--primary-dark); }

        /* ================================================================
           PAGINATION
           ================================================================ */
        .pagination {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 14px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .pagination a {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: all var(--transition-fast);
            min-width: 32px;
            text-align: center;
        }
        .pagination a:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .pagination a.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .pagination span {
            color: var(--text-muted);
            font-size: 12px;
        }
        .pagination .info {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ================================================================
           LOADING STATE
           ================================================================ */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 14px;
            gap: 14px;
        }
        .loading .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .loading .spinner-ring {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .msg { color: var(--text-muted); }

        /* ================================================================
           EMPTY STATE
           ================================================================ */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }
        .empty-state .icon {
            font-size: 34px;
            margin-bottom: 10px;
            opacity: 0.55;
        }
        .empty-state .hint {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.65;
            margin-top: 4px;
        }

        /* ================================================================
           TOAST
           ================================================================ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(16px) scale(0.96);
            transition: opacity var(--transition-slow), transform var(--transition-slow);
            box-shadow: var(--shadow-lg);
            pointer-events: auto;
            max-width: 380px;
            position: relative;
            overflow: hidden;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .toast::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
        }
        .toast.toast-success::before { background: var(--success); }
        .toast.toast-error::before { background: var(--danger); }
        .toast.toast-warning::before { background: var(--warning); }
        .toast.toast-info::before { background: var(--primary); }

        /* ================================================================
           TIER BADGES
           ================================================================ */
        .tier-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin: 0 2px;
            letter-spacing: 0.02em;
        }
        .tier-1000 { background: #e0f2fe; color: #0369a1; }
        .tier-3000 { background: #dcfce7; color: #15803d; }
        .tier-10000 { background: var(--warning-bg); color: #b45309; }
        .tier-100000 { background: var(--danger-bg); color: #be123c; }

        /* ================================================================
           RANK STYLES
           ================================================================ */
        .rank-1 { color: #f59e0b; font-weight: 700; }
        .rank-2 { color: #94a3b8; font-weight: 700; }
        .rank-3 { color: #cd7f32; font-weight: 700; }

        /* ================================================================
           SECTION DIVIDER
           ================================================================ */
        .section-divider {
            height: 1px;
            background: linear-gradient(to right, var(--border), transparent);
            margin: 20px 0 16px;
        }

        /* ================================================================
           UTILITY
           ================================================================ */
        .text-muted { color: var(--text-muted); }
        .text-mono { font-family: var(--font-mono); }
        .text-sm { font-size: 12px; }
        .text-xs { font-size: 11px; }
        .text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 16px; }
        .mb-1 { margin-bottom: 8px; }
        .gap-1 { gap: 8px; }
        .gap-2 { gap: 16px; }
        .flex { display: flex; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .flex-between { display: flex; align-items: center; justify-content: space-between; }
        .flex-wrap { flex-wrap: wrap; }
        .w-full { width: 100%; }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 900px) {
            .nav-links a { padding: 6px 9px; font-size: 12px; }
            .nav-search input { width: 140px; }
            .nav-search input:focus { width: 170px; }
            .stats-row { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
            .container { padding: 18px 16px; }
        }
        @media (max-width: 640px) {
            html { font-size: 14px; }
            .nav {
                flex-wrap: wrap;
                height: auto;
                min-height: var(--nav-height);
                padding: 8px 14px;
                gap: 6px;
            }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                padding: 8px 0 4px;
                gap: 2px;
            }
            .nav-links.open { display: flex; }
            .nav-links a {
                width: 100%;
                padding: 10px 12px;
                font-size: 14px;
            }
            .nav-links a.active::after {
                left: 14px;
                top: 50%;
                bottom: auto;
                transform: translateY(-50%);
                width: 5px;
                height: 5px;
            }
            .nav-toggle { display: block; }
            .nav-search { margin-left: 0; width: 100%; }
            .nav-search input { flex: 1; width: auto; }
            .nav-search input:focus { width: auto; }
            .nav-search .search-icon { left: 12px; }
            .nav-search input { padding-left: 32px; }
            .container { padding: 12px; }
            .card { padding: 14px 16px; border-radius: 8px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-card { padding: 12px 10px; }
            .stat-card .num { font-size: 20px; }
            th, td { padding: 8px 8px; font-size: 12px; }
            .filter-bar { gap: 6px; }
            .filter-bar select,
            .filter-bar input,
            .filter-bar button {
                font-size: 12px;
                padding: 5px 8px;
                height: 30px;
            }
            .filter-bar .btn-group { height: 30px; }
            .toast-container {
                left: 12px;
                right: 12px;
                bottom: 12px;
            }
            .toast {
                max-width: none;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <span class="brand-icon">&#9650;</span>
            <span class="brand-text">StreamDash</span>
        </div>
        <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')" aria-label="Toggle navigation">&#9776;</button>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">仪表盘</a>
            <a href="/leaderboard" class="{% if request.path == '/leaderboard' %}active{% endif %}">积分榜</a>
            <a href="/chat" class="{% if request.path == '/chat' %}active{% endif %}">弹幕</a>
            <a href="/anonymous" class="{% if request.path == '/anonymous' %}active{% endif %}">神秘人</a>
            <a href="/sessions" class="{% if request.path == '/sessions' %}active{% endif %}">场次</a>
        </div>
        <form class="nav-search" onsubmit="return doSearch(this.uid.value.trim())">
            <div class="search-wrap">
                <span class="search-icon">&#128269;</span>
                <input name="uid" id="search-input" placeholder="搜索用户ID或昵称..." autocomplete="off">
            </div>
            <button type="submit">搜索</button>
        </form>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script>
        /* ── Toast System ── */
        function showToast(msg, type) {
            var container = document.getElementById('toast-container');
            var t = document.createElement('div');
            t.className = 'toast' + (type ? ' toast-' + type : '');
            t.textContent = msg;
            container.appendChild(t);
            /* Force reflow then show */
            t.offsetHeight;
            t.classList.add('show');
            t._timer = setTimeout(function() {
                t.classList.remove('show');
                setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 400);
            }, 3000);
        }

        /* ── Nav Search: resolve nickname → user_id ── */
        function doSearch(q) {
            if (!q) return false;
            if (/^\d{6,}$/.test(q)) {
                window.location.href = '/user?uid=' + encodeURIComponent(q);
                return false;
            }
            fetch('/api/search?q=' + encodeURIComponent(q) + '&size=5')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.users && d.users.length >= 1) {
                        window.location.href = '/user?uid=' + d.users[0].user_id;
                    } else {
                        window.location.href = '/user?uid=' + encodeURIComponent(q);
                    }
                })
                .catch(function() {
                    window.location.href = '/user?uid=' + encodeURIComponent(q);
                });
            return false;
        }

        /* ── Close mobile nav on link click ── */
        document.querySelectorAll('.nav-links a').forEach(function(a) {
            a.addEventListener('click', function() {
                var navLinks = document.querySelector('.nav-links');
                if (navLinks) navLinks.classList.remove('open');
            });
        });
    </script>
</body>
</html>
