<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>登录 · StreamDash</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-bg: #fce4ec;
            --radius: 10px;
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --font: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition-fast: 0.15s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .login-card .sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .login-card label {
            display: block;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .login-card input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: var(--font);
            outline: none;
            transition: border var(--transition-fast);
        }
        .login-card input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .login-card button {
            width: 100%;
            margin-top: 18px;
            padding: 10px 0;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        .login-card button:hover { background: var(--primary-dark); }
        .login-card .error {
            margin-top: 14px;
            font-size: 13px;
            color: var(--danger);
            background: var(--danger-bg);
            padding: 8px 12px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>StreamDash</h1>
    <p class="sub">弹幕后台管理面板</p>
    <form method="POST">
        <label for="pw">管理密码</label>
        <input id="pw" name="password" type="password" placeholder="输入面板密码" autofocus required>
        <button type="submit">登 录</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
</div>
</body>
</html>
