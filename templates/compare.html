{% extends "base.html" %}
{% block title %}主播对比{% endblock %}
{% block content %}
<style>
.compare-selector {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 16px;
}
.compare-selector select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; background: var(--card); color: var(--text); min-width: 200px;
}
.compare-selector .btn-add {
    background: var(--primary); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 8px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
}
.compare-selector .btn-add:hover { opacity: 0.9; }
.compare-selector .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
.added-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    background: var(--primary-light); color: var(--primary-dark);
    font-size: 12px; font-weight: 600;
}
.added-tag button {
    background: none; border: none; color: var(--primary-dark);
    cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
}
.added-tag button:hover { color: var(--danger); }
.chart-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-bottom: 20px;
}
.chart-grid canvas { max-height: 300px; }
.compare-table th { white-space: nowrap; }
.compare-table td { text-align: right; }
.compare-table td:first-child { text-align: left; font-weight: 600; }
@media (max-width: 640px) {
    .chart-grid { grid-template-columns: 1fr; }
}
</style>

<div class="card">
    <h2>主播对比</h2>
    <p class="sub">选择 2-6 个场次进行多维度对比分析</p>
</div>

<!-- Session Selector -->
<div class="card">
    <div class="compare-selector">
        <select id="session-select">
            <option value="">选择场次...</option>
            {% for s in sessions %}
            <option value="{{ s.id }}">#{{ s.id }} {{ s.anchor_name }} ({{ s.start_time[:10] if s.start_time else '' }})</option>
            {% endfor %}
        </select>
        <button class="btn-add" id="btn-add" onclick="addSession()">添加</button>
        <span style="font-size:12px;color:var(--text-muted);margin-left:8px;" id="tag-hint"></span>
    </div>
    <div id="selected-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;"></div>
    <button id="btn-compare" onclick="runCompare()" disabled
            style="margin-top:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;">
        开始对比
    </button>
</div>

<!-- Loading -->
<div id="loading" class="loading" style="display:none;">
    <div class="spinner"></div>
    <div class="msg">加载中...</div>
</div>

<!-- Results -->
<div id="compare-results" style="display:none;">
    <!-- Charts -->
    <div class="card">
        <h2>数据可视化</h2>
        <div class="chart-grid">
            <div>
                <h3 style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">总音浪对比</h3>
                <canvas id="chart-diamonds"></canvas>
            </div>
            <div>
                <h3 style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">礼物 & 弹幕数</h3>
                <canvas id="chart-gifts-chats"></canvas>
            </div>
            <div>
                <h3 style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">千分用户数</h3>
                <canvas id="chart-users"></canvas>
            </div>
            <div>
                <h3 style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">综合雷达</h3>
                <canvas id="chart-radar"></canvas>
            </div>
        </div>
    </div>

    <!-- Summary Table -->
    <div class="card">
        <h2>汇总对比</h2>
        <div class="table-wrap">
            <table class="compare-table">
                <thead>
                    <tr><th>指标</th></tr>
                </thead>
                <tbody id="compare-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
var selectedIds = [];
var charts = {};

function renderTags() {
    var container = document.getElementById('selected-tags');
    var hint = document.getElementById('tag-hint');
    container.innerHTML = '';
    if (selectedIds.length === 0) {
        hint.textContent = '';
    } else {
        hint.textContent = '已选 ' + selectedIds.length + ' 场';
    }
    var select = document.getElementById('session-select');
    selectedIds.forEach(function(id) {
        var opt = select.querySelector('option[value="' + id + '"]');
        var label = opt ? opt.textContent : '#' + id;
        var tag = document.createElement('span');
        tag.className = 'added-tag';
        tag.innerHTML = label + ' <button onclick="removeSession(' + id + ')">&times;</button>';
        container.appendChild(tag);
    });
    document.getElementById('btn-compare').disabled = selectedIds.length < 2;
    document.getElementById('btn-add').disabled = selectedIds.length >= 6;
}

function addSession() {
    var select = document.getElementById('session-select');
    var id = parseInt(select.value);
    if (!id || selectedIds.indexOf(id) >= 0 || selectedIds.length >= 6) return;
    selectedIds.push(id);
    renderTags();
}

function removeSession(id) {
    selectedIds = selectedIds.filter(function(x) { return x !== id; });
    renderTags();
}

function destroyCharts() {
    Object.keys(charts).forEach(function(k) {
        if (charts[k]) { charts[k].destroy(); charts[k] = null; }
    });
    charts = {};
}

function runCompare() {
    if (selectedIds.length < 2) return;
    destroyCharts();
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('compare-results').style.display = 'none';

    fetchWithTimeout('/api/compare?session_ids=' + selectedIds.join(','), {}, 20000)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('compare-results').style.display = 'block';
            renderCharts(d);
            renderTable(d);
        })
        .catch(function(err) {
            document.getElementById('loading').innerHTML = '<span style="color:var(--danger);">加载失败: ' + err.message + '</span>';
        });
}

function sessionLabel(s) {
    return (s.anchor_name || '#' + s.id) + ' (' + (s.start_time || '').substring(0, 10) + ')';
}

function getPalette(n) {
    var palettes = [
        ['#6366f1','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6'],
        ['#6366f1','#10b981','#ef4444','#f59e0b'],
    ];
    if (n <= 6) return palettes[0].slice(0, n);
    return palettes[1].slice(0, n);
}

function renderCharts(d) {
    var sessions = d.sessions;
    if (!sessions || sessions.length < 2) return;
    var labels = sessions.map(sessionLabel);
    var colors = getPalette(sessions.length);

    /* Chart 1: Total Diamonds */
    charts.diamonds = new Chart(document.getElementById('chart-diamonds'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: sessions.map(function(s) { return s.total_diamonds; }),
                backgroundColor: colors,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: true,
            plugins: {legend: {display: false}},
            scales: {
                y: {beginAtZero: true, ticks: {callback: function(v) { return v >= 10000 ? (v/10000).toFixed(1)+'w' : v; }}}
            }
        }
    });

    /* Chart 2: Grouped Bar - Gifts + Chats */
    charts.giftsChats = new Chart(document.getElementById('chart-gifts-chats'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {label: '礼物数', data: sessions.map(function(s) { return s.total_gifts; }), backgroundColor: '#6366f1', borderRadius: 4},
                {label: '弹幕数', data: sessions.map(function(s) { return s.total_chats; }), backgroundColor: '#06b6d4', borderRadius: 4}
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: true,
            plugins: {legend: {position: 'bottom', labels: {font: {size: 11}}}},
            scales: {y: {beginAtZero: true}}
        }
    });

    /* Chart 3: Qualified Users */
    charts.users = new Chart(document.getElementById('chart-users'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: sessions.map(function(s) { return s.total_users; }),
                backgroundColor: colors,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: true,
            plugins: {legend: {display: false}},
            scales: {y: {beginAtZero: true, ticks: {stepSize: 1}}}
        }
    });

    /* Chart 4: Radar - Normalized 0-100% */
    var maxDiamonds = Math.max.apply(null, sessions.map(function(s) { return s.total_diamonds; })) || 1;
    var maxGifts = Math.max.apply(null, sessions.map(function(s) { return s.total_gifts; })) || 1;
    var maxChats = Math.max.apply(null, sessions.map(function(s) { return s.total_chats; })) || 1;
    var maxUsers = Math.max.apply(null, sessions.map(function(s) { return s.total_users; })) || 1;

    var radarDatasets = sessions.map(function(s, i) {
        return {
            label: sessionLabel(s),
            data: [
                Math.round(s.total_diamonds / maxDiamonds * 100),
                Math.round(s.total_gifts / maxGifts * 100),
                Math.round(s.total_chats / maxChats * 100),
                Math.round(s.total_users / maxUsers * 100)
            ],
            borderColor: colors[i],
            backgroundColor: colors[i] + '20',
            pointBackgroundColor: colors[i]
        };
    });

    charts.radar = new Chart(document.getElementById('chart-radar'), {
        type: 'radar',
        data: {labels: ['音浪', '礼物数', '弹幕数', '千分用户'], datasets: radarDatasets},
        options: {
            responsive: true, maintainAspectRatio: true,
            plugins: {legend: {position: 'bottom', labels: {font: {size: 10}}}},
            scales: {r: {beginAtZero: true, max: 100, ticks: {display: false}}}
        }
    });
}

function renderTable(d) {
    var sessions = d.sessions;
    var thead = document.querySelector('.compare-table thead tr');
    var tbody = document.getElementById('compare-tbody');

    /* Build header */
    var headerCells = '<th>指标</th>';
    sessions.forEach(function(s) {
        headerCells += '<th>' + sessionLabel(s) + '</th>';
    });
    thead.innerHTML = headerCells;

    /* Build rows */
    var rows = [
        {label: '音浪', key: 'total_diamonds', fmt: function(v) { return v.toLocaleString(); }},
        {label: '礼物数', key: 'total_gifts', fmt: function(v) { return v.toLocaleString(); }},
        {label: '弹幕数', key: 'total_chats', fmt: function(v) { return v.toLocaleString(); }},
        {label: '千分用户', key: 'total_users', fmt: function(v) { return v.toLocaleString(); }},
        {label: '最热礼物', key: 'top_gift', fmt: function(v) { return v || '-'; }},
        {label: '状态', key: 'status', fmt: function(v) { return v === 'live' ? '直播中' : (v === 'ended' ? '已结束' : v); }},
    ];

    var html = '';
    rows.forEach(function(row) {
        html += '<tr><td>' + row.label + '</td>';
        sessions.forEach(function(s) {
            var val = s[row.key];
            if (val === null || val === undefined) val = 0;
            html += '<td>' + row.fmt(val) + '</td>';
        });
        html += '</tr>';
    });
    tbody.innerHTML = html;
}
</script>
{% endblock %}
