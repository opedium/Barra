{% extends "base.html" %}
{% block title %}积分榜{% endblock %}
{% block content %}
<div class="card">
    <!-- Header -->
    <div class="flex-between" style="margin-bottom:16px;">
        <h2 style="margin-bottom:0;display:flex;align-items:center;gap:10px;">
            积分榜单
            <span class="text-muted text-sm" style="font-weight:400;">实时贡献排行</span>
        </h2>
        <span id="total-count" class="total-count-badge" style="display:none;"></span>
    </div>

    <!-- Session Selector with dates -->
    <div id="session-selector" style="display:none;margin-bottom:10px;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;">
        <span style="font-size:12px;color:var(--text-muted);">切换场次:</span>
        <select id="session-select" onchange="onSessionChange(this.value)" style="margin-left:8px;font-size:13px;min-width:200px;"></select>
    </div>

    <!-- Controls -->
    <div class="filter-bar lb-filter-bar">
        <div class="btn-group" id="period-group">
            <button class="active" data-period="session">当前直播</button>
            <button data-period="recent">最近一场</button>
            <button data-period="month">本月</button>
            <button data-period="30d">近30天</button>
            <button data-period="all">全部</button>
            <button data-period="million">月百万</button>
        </div>
        <input type="month" id="month-picker" class="month-picker" onchange="monthChanged()">

        <span class="threshold-label" id="streamer-label" style="display:none;">主播</span>
        <select id="streamer-select" onchange="onStreamerChange(this.value)" style="max-width:150px;display:none;">
            <option value="">全部主播</option>
        </select>

        <span class="filter-divider"></span>

        <span class="threshold-label">门槛</span>
        <select id="threshold-select">
            <option value="0" selected>全部</option>
            <option value="1000">1,000</option>
            <option value="3000">3,000</option>
            <option value="10000">10,000</option>
            <option value="100000">100,000</option>
        </select>
        <input type="number" id="custom-threshold" class="custom-threshold-input" placeholder="自定义">

        <span class="filter-divider"></span>

        <span class="threshold-label">最低消费</span>
        <input type="number" id="min-consume-input" class="custom-threshold-input" placeholder="0" value="0">

        <span class="filter-divider"></span>

        <span class="threshold-label">Top N</span>
        <input type="number" id="topn-input" class="custom-threshold-input" placeholder="50" value="50" min="1">

        <span class="filter-divider"></span>

        <button id="sort-btn" class="sort-btn" onclick="toggleSort()">按贡献值</button>
        <button onclick="loadData()" class="btn-refresh">&#x27F3; 刷新</button>
        <button onclick="exportCSV()" class="btn-csv">&#x2B06; 导出CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <table id="data-table" style="display:none;">
            <thead>
                <tr>
                    <th>排名</th>
                    <th>用户</th>
                    <th>ID</th>
                    <th>粉丝团</th>
                    <th>财富等级</th>
                    <th>贡献值</th>
                    <th>上榜次数</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="msg">加载中...</div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination" style="display:none;"></div>
</div>

<style>
/* ================================================================
   LEADERBOARD-SPECIFIC STYLES
   ================================================================ */

/* Total count badge */
.total-count-badge {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 4px 14px;
    border-radius: 20px;
    font-weight: 500;
    border: 1px solid var(--border);
}


/* Filter bar refinements */
.lb-filter-bar { margin-bottom: 14px; }

.filter-divider {
    display: inline-block;
    width: 1px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
}

.threshold-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
}

.month-picker { width: 150px; font-family: var(--font); }

.custom-threshold-input { width: 95px; }

/* Refresh button */
.btn-refresh {
    background: var(--card) !important;
    color: var(--text-muted) !important;
    border-color: var(--border) !important;
    font-weight: 500 !important;
}
.btn-refresh:hover {
    background: var(--bg) !important;
    color: var(--text) !important;
}

.btn-csv {
    background: var(--success) !important;
    color: #fff !important;
    border-color: var(--success) !important;
    font-weight: 600 !important;
}
.btn-csv:hover {
    background: #059669 !important;
}

.sort-btn { font-weight: 500; }

/* Table column alignment */
#data-table th, #data-table td { padding: 10px 10px; white-space: nowrap; }
#data-table th:nth-child(1), #data-table td:nth-child(1) { text-align: center; width: 60px; }
#data-table th:nth-child(2) { min-width: 120px; }
#data-table th:nth-child(3) { width: 110px; }
#data-table th:nth-child(4), #data-table td:nth-child(4),
#data-table th:nth-child(5), #data-table td:nth-child(5),
#data-table th:nth-child(7), #data-table td:nth-child(7) { text-align: center; width: 75px; }
#data-table th:nth-child(6) { text-align: right; width: 100px; }
#data-table td:nth-child(6) { text-align: right; }
#data-table th:nth-child(8), #data-table td:nth-child(8) { text-align: center; width: 55px; }

/* Rank highlighting */
.rank-1::before { content: ''; margin-right: 2px; }
.rank-2::before { content: ''; margin-right: 2px; }
.rank-3::before { content: ''; margin-right: 2px; }

/* Row highlights for top 3 */
#data-table tbody tr:has(> td.rank-1) td { background: #fffbeb !important; }
#data-table tbody tr:has(> td.rank-2) td { background: #f8fafc !important; }
#data-table tbody tr:has(> td.rank-3) td { background: #fff7ed !important; }
#data-table tbody tr:nth-child(even):has(> td.rank-1) td { background: #fffbeb !important; }
#data-table tbody tr:nth-child(even):has(> td.rank-2) td { background: #f8fafc !important; }
#data-table tbody tr:nth-child(even):has(> td.rank-3) td { background: #fff7ed !important; }
#data-table tbody tr:has(> td.rank-1):hover td,
#data-table tbody tr:has(> td.rank-2):hover td,
#data-table tbody tr:has(> td.rank-3):hover td { filter: brightness(0.96); }

#data-table tbody tr:has(> td.rank-1) td:first-child { box-shadow: inset 3px 0 0 #f59e0b; }
#data-table tbody tr:has(> td.rank-2) td:first-child { box-shadow: inset 3px 0 0 #94a3b8; }
#data-table tbody tr:has(> td.rank-3) td:first-child { box-shadow: inset 3px 0 0 #cd7f32; }

.rank-1, .rank-2, .rank-3 { font-weight: 700 !important; border-radius: 4px; }
.rank-1 { color: #92400e !important; }
.rank-2 { color: #475569 !important; }
.rank-3 { color: #92400e !important; }
#data-table td:first-child:not(.rank-1):not(.rank-2):not(.rank-3) {
    color: var(--text-soft) !important;
    font-weight: 500 !important;
}

/* Pagination */
#pagination.pagination {
    margin-top: 18px;
    justify-content: center;
    gap: 4px;
}
#pagination.pagination span {
    margin: 0 10px;
    font-size: 13px;
    color: var(--text-muted);
}

/* User link */
#data-table td a[href^="/user"] {
    font-weight: 500;
    color: var(--primary);
}
#data-table td a[href^="/user"]:hover {
    color: var(--primary-dark);
}

/* Empty state */
#data-table td[colspan] {
    padding: 40px 20px !important;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
}
</style>

<script>
var currentPage = 1, currentThreshold = 0, currentPeriod = 'session', currentSort = 'consume', currentMinConsume = 0, currentTopN = 50, currentStreamer = '', currentRoomId = '';
var lockedSessionId = null;

// Check URL for session_id
var params = new URLSearchParams(window.location.search);
if (params.get('session_id')) {
    lockedSessionId = parseInt(params.get('session_id'));
    if (isNaN(lockedSessionId)) lockedSessionId = null;
    loadSessionSelector();
}

function loadSessionSelector() {
    fetchWithTimeout('/api/sessions?limit=50')
        .then(function(r) { return r.json(); })
        .then(function(sessions) {
            if (!sessions || sessions.length <= 1) return;
            // Group by anchor_name, show latest session per anchor
            var seen = {}, filtered = [];
            sessions.forEach(function(s) {
                var key = s.anchor_name || s.room_id;
                if (!seen[key]) { seen[key] = true; filtered.push(s); }
            });
            if (filtered.length <= 1) return;
            var sel = document.getElementById('session-select');
            sel.innerHTML = '';
            filtered.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s.id;
                var dt = (s.start_time || '').substr(0, 16);
                var label = '#' + s.id + ' ' + dt + ' ' + (s.anchor_name || s.room_id || '');
                if (s.status === 'live') label = '🔴 ' + label;
                opt.textContent = label;
                if (lockedSessionId && s.id === lockedSessionId) opt.selected = true;
                sel.appendChild(opt);
            });
            document.getElementById('session-selector').style.display = 'flex';
        });
}
function loadStreamers() {
    fetchWithTimeout('/api/leaderboard/streamers')
        .then(function(r) { return r.json(); })
        .then(function(list) {
            if (!list || list.length === 0) return;
            var sel = document.getElementById('streamer-select');
            sel.innerHTML = '<option value="">全部主播</option>';
            list.forEach(function(item) {
                var opt = document.createElement('option');
                opt.value = item.id;
                opt.dataset.name = item.name;
                opt.textContent = item.name;
                if (currentRoomId === item.id) opt.selected = true;
                sel.appendChild(opt);
            });
        });
}

function onStreamerChange(roomId) {
    currentRoomId = roomId;
    var sel = document.getElementById('streamer-select');
    var opt = sel.options[sel.selectedIndex];
    currentStreamer = opt ? opt.dataset.name || '' : '';
    currentPage = 1;
    loadData();
}

function onSessionChange(sid) {
    lockedSessionId = parseInt(sid);
    currentPage = 1;
    loadData();
}

function toggleControls(period) {
    var isMillion = period === 'million';
    var isSession = period === 'session';
    var is30d = period === '30d';

    // 门槛 + 自定义: only session (uses qualified_1000/3000/10000/100000 columns)
    var showThreshold = period === 'session';
    document.getElementById('threshold-select').style.display = showThreshold ? '' : 'none';
    document.getElementById('custom-threshold').style.display = showThreshold ? '' : 'none';

    // 最低消费: today, month, 30d, all (simple single-input filter)
    var showMinConsume = period === 'recent' || period === 'month' || period === '30d' || period === 'all';
    document.getElementById('min-consume-input').style.display = showMinConsume ? '' : 'none';

    // 排序按钮: session, today, month, all (not 30d, not million)
    var showSort = period === 'session' || period === 'recent' || period === 'month' || period === 'all';
    document.getElementById('sort-btn').style.display = showSort ? '' : 'none';

    // Top N: today, month, 30d, all (not session, not million)
    var showTopN = !isMillion && !isSession;
    document.getElementById('topn-input').style.display = showTopN ? '' : 'none';

    // Dividers: only show when BOTH surrounding controls are visible
    document.querySelectorAll('.filter-divider')[0].style.display = (showThreshold && showMinConsume) ? '' : 'none';
    document.querySelectorAll('.filter-divider')[1].style.display = showMinConsume ? '' : 'none';
    document.querySelectorAll('.filter-divider')[2].style.display = (showTopN && showSort) ? '' : 'none';

    // 月选择器: month, million, all
    var showPicker = period === 'month' || period === 'million' || period === 'all';
    document.getElementById('month-picker').style.display = showPicker ? '' : 'none';

    // 主播筛选: month, 30d, all, million (not session/recent)
    var showStreamer = period === 'month' || period === '30d' || period === 'all' || period === 'million';
    document.getElementById('streamer-label').style.display = showStreamer ? '' : 'none';
    document.getElementById('streamer-select').style.display = showStreamer ? '' : 'none';

    var picker = document.getElementById('month-picker');
    if (!picker.value) {
        var d = new Date();
        picker.value = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }
    var thead = document.querySelector('#data-table thead tr');
    if (isMillion) {
        thead.innerHTML = '<th>排名</th><th>昵称</th><th>ID</th><th>月总贡献</th><th>活跃天数</th><th>操作</th>';
    } else {
        thead.innerHTML = '<th>排名</th><th>昵称</th><th>ID</th><th>粉丝团</th><th>财富等级</th><th>贡献值</th><th>上榜次数</th><th>操作</th>';
    }
}

function monthChanged() {
    currentPage = 1;
    var ym = document.getElementById('month-picker').value || '';
    var monthBtn = document.querySelector('[data-period="month"]');
    var millionBtn = document.querySelector('[data-period="million"]');
    monthBtn.textContent = ym ? ym + ' 月榜' : '本月';
    millionBtn.textContent = ym ? '月百万' : '月百万';
    loadData();
}

document.getElementById('period-group').addEventListener('click', function(e) {
    if (e.target.tagName === 'BUTTON' && !e.target.disabled) {
        this.querySelectorAll('button').forEach(function(b) { b.className = ''; });
        e.target.className = 'active';
        currentPeriod = e.target.dataset.period;
        currentPage = 1;
        // Reset filters when switching periods
        currentMinConsume = 0;
        document.getElementById('min-consume-input').value = '0';
        if (currentPeriod === 'session') {
            currentThreshold = parseInt(document.getElementById('threshold-select').value) || 1000;
        } else {
            currentThreshold = 1000;
        }
        toggleControls(currentPeriod);
        if (currentPeriod !== 'month') document.querySelector('[data-period="month"]').textContent = '本月';
        if (currentPeriod !== 'million') document.querySelector('[data-period="million"]').textContent = '月百万';
        lockedSessionId = null;  // 切换周期时清除锁定的场次
        document.getElementById('session-selector').style.display = 'none';
        loadData();
    }
});

document.getElementById('threshold-select').addEventListener('change', function() {
    currentThreshold = parseInt(this.value);
    currentPage = 1;
    loadData();
});

document.getElementById('custom-threshold').addEventListener('change', function() {
    var v = parseInt(this.value);
    if (v > 0) { currentThreshold = v; currentPage = 1; loadData(); }
});

document.getElementById('min-consume-input').addEventListener('change', function() {
    var v = parseInt(this.value);
    currentMinConsume = v > 0 ? v : 0;
    currentPage = 1;
    loadData();
});

document.getElementById('topn-input').addEventListener('change', function() {
    var v = parseInt(this.value);
    currentTopN = v > 0 ? v : 50;
    currentPage = 1;
    loadData();
});

function toggleSort() {
    currentSort = currentSort === 'consume' ? 'sessions' : 'consume';
    document.getElementById('sort-btn').textContent = currentSort === 'consume' ? '按贡献值' : '按上榜次数';
    currentPage = 1;
    loadData();
}

function loadData() {
    var el = document.getElementById('loading');
    var tbl = document.getElementById('data-table');
    var tbody = document.getElementById('table-body');
    var pag = document.getElementById('pagination');
    var tc = document.getElementById('total-count');
    el.style.display = 'flex';
    tbl.style.display = 'none';
    pag.style.display = 'none';

    var isMillion = currentPeriod === 'million';

    if (isMillion) {
        var ym = document.getElementById('month-picker').value || '';
        fetchWithTimeout('/api/million?page=' + currentPage + '&size=50&year_month=' + ym)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                el.style.display = 'none';
                tc.textContent = '共 ' + data.total + ' 位';
                tc.style.display = '';
                tbody.innerHTML = '';
                if (!data.users || data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-soft);padding:30px;">本月暂无百万用户</td></tr>';
                    tbl.style.display = 'table';
                    return;
                }
                data.users.forEach(function(u) {
                    var tr = document.createElement('tr');
                    var rankClass = u.rank === 1 ? 'rank-1' : (u.rank === 2 ? 'rank-2' : (u.rank === 3 ? 'rank-3' : ''));
                    tr.innerHTML = '<td class="' + rankClass + '" style="font-weight:600;">#' + u.rank + '</td>' +
                        '<td><a href="/user?uid=' + u.user_id + '" style="font-weight:500;">' + u.user_name + '</a></td>' +
                        '<td style="font-family:var(--font-mono);font-size:12px;color:var(--text-soft);">' + u.user_id + '</td>' +
                        '<td style="font-weight:600;">' + (u.total_consume || 0).toLocaleString() + '</td>' +
                        '<td>' + (u.days_active || 0) + '天</td>' +
                        '<td><a href="/user?uid=' + u.user_id + '">详情</a></td>';
                    tbody.appendChild(tr);
                });
                tbl.style.display = 'table';
                var pageSize = currentPeriod === 'million' ? 50 : currentTopN;
                var totalPages = Math.ceil(data.total / pageSize);
                if (totalPages > 1) {
                    var html = '';
                    if (currentPage > 1) html += '<a href="#" onclick="gotoPage(' + (currentPage-1) + ');return false;">&#8249;</a>';
                    html += '<span>第 ' + currentPage + ' / ' + totalPages + ' 页</span>';
                    if (currentPage < totalPages) html += '<a href="#" onclick="gotoPage(' + (currentPage+1) + ');return false;">&#8250;</a>';
                    pag.innerHTML = html;
                    pag.style.display = 'flex';
                }
            })
            .catch(function(err) {
                el.style.display = 'none';
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--danger);padding:30px;">加载失败: ' + err.message + '</td></tr>';
                tbl.style.display = 'table';
            });
        return;
    }

    if (currentPeriod === 'recent') {
        // 最近一场：取当前主播最近已结束的场次，并弹出选场次列表
        currentPeriod = 'session';
        var sessionsUrl = '/api/sessions?limit=30';
        if (currentRoomId) sessionsUrl += '&anchor=' + encodeURIComponent(currentRoomId);
        fetchWithTimeout(sessionsUrl)
            .then(function(r) { return r.json(); })
            .then(function(list) {
                if (list && list.length > 0) {
                    // 显示所有已结束场次供选择
                    var sel = document.getElementById('session-select');
                    sel.innerHTML = '';
                    list.forEach(function(s) {
                        if (s.status === 'ended') {
                            var opt = document.createElement('option');
                            opt.value = s.id;
                            opt.textContent = '#' + s.id + ' ' + (s.start_time || '').substr(0, 16) + ' ' + (s.anchor_name || '');
                            sel.appendChild(opt);
                        }
                    });
                    if (sel.options.length > 0) {
                        sel.selectedIndex = 0;
                        lockedSessionId = parseInt(sel.options[0].value);
                        document.getElementById('session-selector').style.display = 'flex';
                    }
                }
                doLoadLeaderboard();
            })
            .catch(function() { doLoadLeaderboard(); });
        return;
    }
    doLoadLeaderboard();

    function doLoadLeaderboard() {
    var url = '/api/leaderboard?threshold=' + currentThreshold + '&period=' + currentPeriod + '&page=' + currentPage + '&size=' + currentTopN + '&sort_by=' + currentSort + '&min_consume=' + currentMinConsume;
    if (currentRoomId) url += '&room_id=' + encodeURIComponent(currentRoomId);
    if (lockedSessionId) url += '&session_id=' + lockedSessionId;
    if (currentPeriod === 'month' || currentPeriod === '30d' || currentPeriod === 'all' || isMillion) {
        var ym = document.getElementById('month-picker').value || '';
        if (ym) url += '&year_month=' + ym;
    }

    fetchWithTimeout(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            el.style.display = 'none';
            tc.textContent = '共 ' + data.total + ' 位';
            tc.style.display = '';
            tbody.innerHTML = '';
            if (!data.users || data.users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-soft);padding:30px;">暂无数据</td></tr>';
                tbl.style.display = 'table';
                return;
            }
            data.users.forEach(function(u) {
                var tr = document.createElement('tr');
                var rankClass = u.rank === 1 ? 'rank-1' : (u.rank === 2 ? 'rank-2' : (u.rank === 3 ? 'rank-3' : ''));
                var avHtml = u.avatar_url
                    ? '<img src="' + u.avatar_url + '" loading="lazy" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" onerror="this.style.display=\'none\'">'
                    : '<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;">' + (u.user_name || '?').charAt(0).toUpperCase() + '</div>';
                tr.innerHTML = '<td class="' + rankClass + '" style="font-weight:600;text-align:center;">#' + u.rank + '</td>' +
                    '<td style="padding:3px;"><div style="display:flex;align-items:center;gap:8px;">' + avHtml + '<a href="/user?uid=' + u.user_id + '" style="color:var(--primary-dark);font-weight:500;">' + u.user_name + '</a></div></td>' +
                    '<td style="font-family:var(--font-mono);font-size:12px;color:var(--text-soft);">' + u.user_id + '</td>' +
                    '<td style="font-size:12px;">' + (u.fans_club || '-') + '</td>' +
                    '<td style="font-size:12px;">' + (u.grade || '-') + '</td>' +
                    '<td style="font-weight:600;">' + (u.consume || 0).toLocaleString() + '</td>' +
                    '<td>' + (u.sessions_count || 0) + '</td>' +
                    '<td><a href="/user?uid=' + u.user_id + '">详情</a></td>';
                tbody.appendChild(tr);
            });
            tbl.style.display = 'table';

            var pageSize = currentPeriod === 'million' ? 50 : currentTopN;
            var totalPages = Math.ceil(data.total / pageSize);
            if (totalPages > 1) {
                var html = '';
                if (currentPage > 1) html += '<a href="#" onclick="gotoPage(' + (currentPage-1) + ');return false;">&#8249;</a>';
                html += '<span>第 ' + currentPage + ' / ' + totalPages + ' 页</span>';
                if (currentPage < totalPages) html += '<a href="#" onclick="gotoPage(' + (currentPage+1) + ');return false;">&#8250;</a>';
                pag.innerHTML = html;
                pag.style.display = 'flex';
            }
        })
        .catch(function(err) {
            el.style.display = 'none';
            document.getElementById('table-body').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);">加载失败: ' + err.message + '</td></tr>';
            document.getElementById('data-table').style.display = 'table';
        });
    }  // end doLoadLeaderboard
}

function gotoPage(p) { currentPage = p; loadData(); }

function exportCSV() {
    var isMillion = currentPeriod === 'million';
    var url = isMillion ? '/api/million/csv' : '/api/leaderboard/csv';
    url += '?period=' + currentPeriod + '&threshold=' + currentThreshold + '&sort_by=' + currentSort;
    if (currentMinConsume > 0) url += '&min_consume=' + currentMinConsume;
    if (currentRoomId) url += '&room_id=' + encodeURIComponent(currentRoomId);
    if (lockedSessionId) url += '&session_id=' + lockedSessionId;
    if (currentPeriod === 'month' || currentPeriod === '30d' || currentPeriod === 'all' || isMillion) {
        var ym = document.getElementById('month-picker').value || '';
        if (ym) url += '&year_month=' + ym;
    }
    var cols = isMillion
        ? ['rank', 'user_id', 'user_name', 'grade', 'fans_club', 'total_consume', 'days_active',
           'sessions_1000', 'sessions_3000', 'sessions_10000', 'sessions_100000', '链接']
        : ['rank', 'user_id', 'user_name', 'grade', 'fans_club', 'consume', 'sessions_count',
           'qualified_1000', 'qualified_3000', 'qualified_10000', 'qualified_100000', '链接'];
    showCsvColumnSelector(url, cols);
}

loadData();
loadStreamers();
</script>
{% endblock %}
