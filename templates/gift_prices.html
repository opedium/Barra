{% extends "base.html" %}
{% block title %}礼物价格管理{% endblock %}
{% block content %}
<style>
.gp-toolbar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 16px;
}
.gp-toolbar input, .gp-toolbar select {
    padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; background: var(--card); color: var(--text);
}
.gp-toolbar input { min-width: 200px; }
.gp-toolbar button {
    padding: 7px 16px; border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition-fast);
}
.gp-toolbar .btn-primary { background: var(--primary); color: #fff; }
.gp-toolbar .btn-primary:hover { opacity: 0.9; }
.gp-toolbar .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.gp-toolbar .btn-outline:hover { background: var(--bg); color: var(--text); }
.gp-toolbar .btn-outline.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.gp-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
}
.gp-table th {
    text-align: left; padding: 8px 10px; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 2px solid var(--border); white-space: nowrap;
}
.gp-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--border-light); vertical-align: middle;
}
.gp-table tr:hover td { background: var(--bg-soft); }
.gp-table .gift-name { font-weight: 600; }
.gp-table .price-cell { font-family: var(--font-mono); font-size: 12px; }
.gp-table .source-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
}
.source-badge.auto { background: var(--warning-bg); color: #92400e; }
.source-badge.manual { background: #dbeafe; color: #1e40af; }
.source-badge.verified { background: var(--success-bg); color: #065f46; }
.tag-limited { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; background: #fce7f3; color: #9d174d; }
.tag-review { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; background: var(--danger-bg); color: var(--danger); }
.pagination {
    display: flex; justify-content: center; gap: 4px; margin-top: 16px;
}
.pagination button {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--card); color: var(--text); font-size: 12px; cursor: pointer;
    transition: all var(--transition-fast);
}
.pagination button:hover { background: var(--bg); }
.pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Modal ── */
.modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 1000;
    display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
    background: var(--card); border-radius: var(--radius-lg);
    padding: 24px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
}
.modal-box h3 { margin: 0 0 16px; font-size: 16px; }
.modal-box .field { margin-bottom: 12px; }
.modal-box .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
.modal-box .field input, .modal-box .field select, .modal-box .field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; background: var(--card); color: var(--text); box-sizing: border-box;
}
.modal-box .field textarea { min-height: 60px; resize: vertical; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-actions button {
    padding: 8px 20px; border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition-fast);
}
.modal-actions .btn-cancel { background: var(--bg); color: var(--text-muted); }
.modal-actions .btn-cancel:hover { background: var(--border); }
.modal-actions .btn-save { background: var(--primary); color: #fff; }
.modal-actions .btn-save:hover { opacity: 0.9; }
.modal-actions .btn-danger { background: var(--danger); color: #fff; }
.modal-actions .btn-danger:hover { opacity: 0.9; }

/* ── Stats Bar ── */
.gp-stats {
    display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap;
}
.gp-stat {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 18px; background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); min-width: 80px;
}
.gp-stat .num { font-size: 20px; font-weight: 700; color: var(--primary); }
.gp-stat .label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── Tabs ── */
.gp-tabs {
    display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px;
}
.gp-tab {
    padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -2px; user-select: none; transition: all var(--transition-fast);
}
.gp-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.gp-tab:hover { color: var(--primary); }

/* ── Audit section ── */
.audit-item {
    padding: 10px 0; border-bottom: 1px solid var(--border-light);
}
.audit-item:last-child { border-bottom: none; }
.audit-item .ai-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.audit-item .ai-detail { font-size: 12px; color: var(--text-muted); }
.audit-item .ai-price { font-family: var(--font-mono); font-size: 12px; }
.price-conflict { color: var(--danger); font-weight: 600; }

/* ── History ── */
.history-item {
    display: flex; align-items: center; gap: 10px; padding: 6px 0;
    border-bottom: 1px solid var(--border-light); font-size: 13px;
}
.history-item:last-child { border-bottom: none; }
.history-item .hi-gift { font-weight: 600; min-width: 100px; }
.history-item .hi-change { font-family: var(--font-mono); font-size: 12px; }
.history-item .hi-old { color: var(--danger); }
.history-item .hi-new { color: var(--success); }
.history-item .hi-time { font-size: 11px; color: var(--text-soft); margin-left: auto; white-space: nowrap; }

@media (max-width: 768px) {
    .gp-toolbar input { min-width: 120px; }
    .gp-table { font-size: 12px; }
    .gp-table th, .gp-table td { padding: 6px 6px; }
}
</style>

<h2 style="margin:0 0 16px;">礼物价格管理</h2>

<div class="gp-stats" id="stats-bar">
    <div class="gp-stat"><span class="num" id="stat-total">0</span><span class="label">礼物种类</span></div>
    <div class="gp-stat"><span class="num" id="stat-manual">0</span><span class="label">已确认</span></div>
    <div class="gp-stat"><span class="num" id="stat-review">0</span><span class="label">待复核</span></div>
</div>

<div class="gp-tabs">
    <span class="gp-tab active" data-tab="list" onclick="switchTab('list')">价格列表</span>
    <span class="gp-tab" data-tab="audit" onclick="switchTab('audit')">审计</span>
</div>

<div id="tab-list">
    <div class="gp-toolbar">
        <input type="text" id="search-input" placeholder="搜索礼物名称..." oninput="debounceSearch()">
        <select id="source-filter" onchange="loadPrices()">
            <option value="">全部来源</option>
            <option value="auto">自动检测</option>
            <option value="manual">手动设置</option>
            <option value="verified">已验证</option>
        </select>
        <button class="btn-outline" id="needs-review-btn" onclick="toggleNeedsReview()">待复核</button>
        <button class="btn-primary" onclick="loadPrices()">刷新</button>
        <span style="font-size:12px;color:var(--text-muted);margin-left:auto;" id="total-label">共 0 项</span>
    </div>

    <div style="overflow-x:auto;">
        <table class="gp-table">
            <thead>
                <tr>
                    <th>礼物名称</th>
                    <th>钻石价格</th>
                    <th>来源</th>
                    <th>日志数</th>
                    <th>钻石总额</th>
                    <th>备注</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="price-list"></tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<div id="tab-audit" style="display:none;">
    <div id="audit-content"><p style="color:var(--text-muted);text-align:center;padding:40px 0;">点击刷新加载审计数据</p></div>
    <button class="btn-primary" onclick="loadAudit()" style="margin-top:8px;">刷新审计</button>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal-box">
        <h3>编辑礼物价格</h3>
        <div class="field">
            <label>礼物名称</label>
            <input type="text" id="edit-gift-name" readonly style="background:var(--bg);">
        </div>
        <div class="field">
            <label>钻石价格</label>
            <input type="number" id="edit-price" min="0" step="1">
        </div>
        <div class="field">
            <label>来源</label>
            <select id="edit-source">
                <option value="manual">手动设置</option>
                <option value="verified">已验证</option>
                <option value="auto">自动检测</option>
            </select>
        </div>
        <div class="field">
            <label>
                <input type="checkbox" id="edit-limited">
                限时皮肤礼物
            </label>
        </div>
        <div class="field" id="edit-base-field" style="display:none;">
            <label>基础礼物名称</label>
            <input type="text" id="edit-base-gift">
        </div>
        <div class="field">
            <label>备注</label>
            <textarea id="edit-notes" placeholder="价格来源、变更原因等"></textarea>
        </div>
        <div class="field">
            <label>
                <input type="checkbox" id="edit-recalculate" checked>
                保存后重新计算历史数据
            </label>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn-save" onclick="savePrice()">保存</button>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let needsReview = false;
let editPriceId = null;
let searchTimer = null;

function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadPrices, 300);
}

function switchTab(tab) {
    document.querySelectorAll('.gp-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.tab === tab);
    });
    document.getElementById('tab-list').style.display = tab === 'list' ? 'block' : 'none';
    document.getElementById('tab-audit').style.display = tab === 'audit' ? 'block' : 'none';
    if (tab === 'audit') loadAudit();
}

function toggleNeedsReview() {
    needsReview = !needsReview;
    document.getElementById('needs-review-btn').classList.toggle('active', needsReview);
    loadPrices();
}

function loadPrices() {
    var search = document.getElementById('search-input').value;
    var source = document.getElementById('source-filter').value;
    var params = new URLSearchParams({
        page: currentPage,
        size: 50,
        search: search,
        source: source,
    });
    if (needsReview) params.set('needs_review', '1');

    fetch('/api/gift-prices?' + params.toString())
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var tbody = document.getElementById('price-list');
            tbody.innerHTML = '';
            if (!data.prices || data.prices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">暂无数据</td></tr>';
                document.getElementById('total-label').textContent = '共 0 项';
                return;
            }
            data.prices.forEach(function(p) {
                var tr = document.createElement('tr');
                var notesHtml = '';
                if (p.notes) {
                    notesHtml = '<span title="' + escapeHtml(p.notes) + '" style="cursor:help;max-width:150px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(p.notes) + '</span>';
                }
                var reviewTag = (p.source === 'auto' && p.notes) ? ' <span class="tag-review">需复核</span>' : '';
                var limitedTag = p.is_limited_skin ? ' <span class="tag-limited">皮肤</span>' : '';
                tr.innerHTML = [
                    '<td><span class="gift-name">' + escapeHtml(p.gift_name) + '</span>' + limitedTag + reviewTag + '</td>',
                    '<td><span class="price-cell">' + p.diamond_count + '</span></td>',
                    '<td><span class="source-badge ' + p.source + '">' + p.source + '</span></td>',
                    '<td>' + p.logs + '</td>',
                    '<td><span class="price-cell">' + (p.total_dia || 0).toLocaleString() + '</span></td>',
                    '<td>' + notesHtml + '</td>',
                    '<td><button class="btn-outline" style="padding:3px 10px;font-size:11px;" onclick="openEdit(' + p.id + ')">编辑</button></td>',
                ].join('');
                tbody.appendChild(tr);
            });
            document.getElementById('total-label').textContent = '共 ' + data.total + ' 项';
            renderPagination(data.total, data.page);
            updateStats(data.prices);
        });
}

function renderPagination(total, page) {
    var el = document.getElementById('pagination');
    var pages = Math.ceil(total / 50);
    if (pages <= 1) { el.innerHTML = ''; return; }
    var html = '';
    html += '<button ' + (page <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (page - 1) + ')">&laquo;</button>';
    for (var i = Math.max(1, page - 2); i <= Math.min(pages, page + 2); i++) {
        html += '<button class="' + (i === page ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    html += '<button ' + (page >= pages ? 'disabled' : '') + ' onclick="goPage(' + (page + 1) + ')">&raquo;</button>';
    el.innerHTML = html;
}

function goPage(p) {
    currentPage = p;
    loadPrices();
}

function updateStats(prices) {
    var total = prices.length;
    var manual = prices.filter(function(p) { return p.source === 'manual' || p.source === 'verified'; }).length;
    var review = prices.filter(function(p) { return p.source === 'auto' && p.notes; }).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-manual').textContent = manual;
    document.getElementById('stat-review').textContent = review;
}

function openEdit(priceId) {
    editPriceId = priceId;
    fetch('/api/gift-prices/' + priceId)
        .then(function(r) { return r.json(); })
        .then(function(p) {
            document.getElementById('edit-gift-name').value = p.gift_name;
            document.getElementById('edit-price').value = p.diamond_count;
            document.getElementById('edit-source').value = p.source || 'manual';
            document.getElementById('edit-limited').checked = !!p.is_limited_skin;
            document.getElementById('edit-base-gift').value = p.base_gift_name || '';
            document.getElementById('edit-notes').value = p.notes || '';
            document.getElementById('edit-recalculate').checked = true;
            var bf = document.getElementById('edit-base-field');
            bf.style.display = p.is_limited_skin ? 'block' : 'none';
            document.getElementById('edit-modal').classList.add('open');
        });
}

document.getElementById('edit-limited').addEventListener('change', function() {
    document.getElementById('edit-base-field').style.display = this.checked ? 'block' : 'none';
});

function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editPriceId = null;
}

function savePrice() {
    if (!editPriceId) return;
    var data = {
        diamond_count: parseInt(document.getElementById('edit-price').value) || 0,
        source: document.getElementById('edit-source').value,
        is_limited_skin: document.getElementById('edit-limited').checked,
        base_gift_name: document.getElementById('edit-base-gift').value,
        notes: document.getElementById('edit-notes').value,
        recalculate: document.getElementById('edit-recalculate').checked,
    };
    fetch('/api/gift-prices/' + editPriceId, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
    })
        .then(function(r) { return r.json(); })
        .then(function(result) {
            if (result.error) {
                alert('错误: ' + result.error);
                return;
            }
            var msg = '已保存';
            if (result.recalculated) {
                msg += '，已重新计算 ' + (result.recalc_result ? (result.recalc_result.affected_rows || 0) + ' 条记录' : '');
            }
            alert(msg);
            closeModal();
            loadPrices();
        })
        .catch(function(err) {
            alert('保存失败: ' + err.message);
        });
}

function loadAudit() {
    var el = document.getElementById('audit-content');
    el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px 0;">加载中...</p>';
    fetch('/api/gift-prices/audit')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var html = '';

            // Discrepancies
            html += '<h4>价格不一致 (' + (data.discrepancies || []).length + ')</h4>';
            if (!data.discrepancies || data.discrepancies.length === 0) {
                html += '<p style="color:var(--text-muted);font-size:13px;">无价格不一致情况</p>';
            } else {
                data.discrepancies.forEach(function(d) {
                    html += '<div class="audit-item">';
                    html += '<div class="ai-title">' + escapeHtml(d.gift_name) + ' <span style="font-weight:400;font-size:12px;color:var(--text-muted);">（' + d.total_occurrences + ' 次）</span></div>';
                    html += '<div class="ai-detail">';
                    d.prices.forEach(function(p) {
                        html += '  <span class="ai-price">' + p.unit_price + ' 钻石</span>（' + p.occurrences + ' 次，' + p.sessions + ' 场）<br>';
                    });
                    html += '  DB 价格：<span class="ai-price">' + (d.db_price !== null ? d.db_price : '未设置') + '</span>';
                    if (d.db_source) html += ' <span class="source-badge ' + d.db_source + '">' + d.db_source + '</span>';
                    html += '</div></div>';
                });
            }

            // Needs review
            html += '<h4 style="margin-top:24px;">待复核 (' + (data.needs_review || []).length + ')</h4>';
            if (!data.needs_review || data.needs_review.length === 0) {
                html += '<p style="color:var(--text-muted);font-size:13px;">无待复核项</p>';
            } else {
                data.needs_review.forEach(function(r) {
                    html += '<div class="audit-item">';
                    html += '<div class="ai-title">' + escapeHtml(r.gift_name) + ' <span class="price-cell">' + r.diamond_count + '</span> <span class="source-badge auto">auto</span></div>';
                    html += '<div class="ai-detail">' + escapeHtml(r.notes) + '</div>';
                    html += '</div>';
                });
            }

            // History
            html += '<h4 style="margin-top:24px;">变更历史</h4>';
            if (!data.history || data.history.length === 0) {
                html += '<p style="color:var(--text-muted);font-size:13px;">无变更记录</p>';
            } else {
                data.history.forEach(function(h) {
                    html += '<div class="history-item">';
                    html += '<span class="hi-gift">' + escapeHtml(h.gift_name) + '</span>';
                    html += '<span class="hi-change"><span class="hi-old">' + h.old_price + '</span> &rarr; <span class="hi-new">' + h.new_price + '</span></span>';
                    if (h.notes) html += '<span style="font-size:11px;color:var(--text-muted);">' + escapeHtml(h.notes) + '</span>';
                    html += '<span class="hi-time">' + (h.changed_at || '') + '</span>';
                    html += '</div>';
                });
            }

            el.innerHTML = html;
        })
        .catch(function(err) {
            el.innerHTML = '<p style="color:var(--danger);">加载失败: ' + err.message + '</p>';
        });
}

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Initial load
loadPrices();
</script>
{% endblock %}
