{% extends "base.html" %}
{% block title %}月百万榜{% endblock %}
{% block content %}
<div class="card">
    <h2>💎 月百万榜</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">月贡献超过 1,000,000 钻石的用户。<span class="text-muted" style="margin-left:8px;font-size:12px;">（也可在 <a href="/leaderboard">🏆 积分榜</a> 中查看）</span></p>
    <div class="table-wrap">
    <table id="data-table" style="display:none;">
        <thead><tr><th>排名</th><th>昵称</th><th>用户ID</th><th>月总贡献</th><th>活跃天数</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
    </div>
    <div id="loading" class="loading"><div class="spinner"></div><div class="msg">加载中...</div></div>
</div>
<script>
function loadData() {
    var el = document.getElementById('loading');
    var tbl = document.getElementById('data-table');
    var tbody = document.getElementById('table-body');
    el.style.display = 'flex'; tbl.style.display = 'none';
    fetch('/api/million?size=200')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            el.style.display = 'none';
            tbody.innerHTML = '';
            if (!d.users || d.users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:30px;">本月暂无百万用户</td></tr>';
                tbl.style.display = 'table'; return;
            }
            d.users.forEach(function(u) {
                var tr = document.createElement('tr');
                var rankClass = u.rank === 1 ? 'rank-1' : (u.rank === 2 ? 'rank-2' : (u.rank === 3 ? 'rank-3' : ''));
                tr.innerHTML = '<td class="' + rankClass + '" style="font-weight:600;">#' + u.rank + '</td>' +
                    '<td><a href="/user?uid=' + u.user_id + '" style="font-weight:500;">' + u.user_name + '</a></td>' +
                    '<td style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);">' + u.user_id + '</td>' +
                    '<td style="font-weight:600;">' + (u.total_consume || 0).toLocaleString() + '</td>' +
                    '<td>' + (u.days_active || 0) + '天</td>';
                tbody.appendChild(tr);
            });
            tbl.style.display = 'table';
        })
        .catch(function(err) {
            el.style.display = 'none';
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--danger);padding:30px;">加载失败: ' + err.message + '</td></tr>';
            tbl.style.display = 'table';
        });
}
loadData();
</script>
{% endblock %}
